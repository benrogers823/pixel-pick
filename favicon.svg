<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" shape-rendering="crispEdges">
  <!-- Dark bg -->
  <rect width="100" height="100" fill="#1a1a2e"/>

  <!-- Base — gold elliptical platform -->
  <!-- bottom shadow row -->
  <rect x="18" y="78" width="64" height="4" fill="#8a6a00"/>
  <!-- main base outer -->
  <rect x="10" y="68" width="80" height="12" fill="#b8960a"/>
  <rect x="14" y="66" width="72" height="4"  fill="#c8a820"/>
  <rect x="18" y="80" width="64" height="4"  fill="#8a6a00"/>
  <!-- base highlight ring -->
  <rect x="14" y="66" width="72" height="2"  fill="#ffe066"/>
  <rect x="18" y="64" width="64" height="2"  fill="#ffe066"/>
  <!-- inner dark groove -->
  <rect x="22" y="70" width="56" height="6"  fill="#8a6a00"/>
  <rect x="26" y="68" width="48" height="4"  fill="#6a4a00"/>
  <!-- centre inner highlight -->
  <rect x="30" y="70" width="40" height="2"  fill="#c8a820"/>

  <!-- Shaft — gold/yellow -->
  <rect x="44" y="40" width="12" height="28" fill="#c8a820"/>
  <rect x="44" y="40" width="4"  height="28" fill="#ffe066"/>
  <rect x="52" y="40" width="4"  height="28" fill="#8a6a00"/>

  <!-- Ball — hot pink/magenta -->
  <!-- shadow/dark edge -->
  <rect x="34" y="6"  width="32" height="4"  fill="#8a0040"/>
  <rect x="30" y="10" width="40" height="4"  fill="#aa0050"/>
  <rect x="26" y="14" width="48" height="4"  fill="#cc1166"/>
  <rect x="24" y="18" width="52" height="4"  fill="#ee2288"/>
  <rect x="24" y="22" width="52" height="4"  fill="#ff3399"/>
  <rect x="24" y="26" width="52" height="4"  fill="#ff3399"/>
  <rect x="26" y="30" width="48" height="4"  fill="#cc1166"/>
  <rect x="30" y="34" width="40" height="4"  fill="#aa0050"/>
  <rect x="34" y="38" width="32" height="4"  fill="#8a0040"/>

  <!-- Ball highlight — top-left bright spot -->
  <rect x="32" y="10" width="14" height="4"  fill="#ff66aa"/>
  <rect x="28" y="14" width="12" height="8"  fill="#ff66aa"/>
  <rect x="32" y="10" width="6"  height="4"  fill="#ff99cc"/>
  <!-- Glint -->
  <rect x="34" y="12" width="4"  height="4"  fill="#ffddee"/>
  <rect x="38" y="8"  width="4"  height="4"  fill="#ffccdd"/>

  <!-- Cross/plus on ball -->
  <rect x="46" y="18" width="8"  height="4"  fill="#ffdd00"/>
  <rect x="50" y="14" width="4"  height="4"  fill="#ffdd00"/>
  <rect x="50" y="22" width="4"  height="4"  fill="#ffdd00"/>
  <rect x="42" y="18" width="4"  height="4"  fill="#ffdd00"/>
  <rect x="54" y="18" width="4"  height="4"  fill="#ffdd00"/>
</svg>
