      // Boost pad collision
      boostPads.forEach(pad => {
        if (pad.used) return;
        if (m.x + marbleR > pad.x && m.x - marbleR < pad.x + pad.w &&
            m.y + marbleR > pad.y && m.y - marbleR < pad.y + pad.h) {
          m.boostTime = t;
          pad.used = true;
          sfx('finish');
        }
      });

      // Boost: 1.8x speed decaying to 1x over 2.5 seconds
      let boostMult = 1.0;
      if (m.boostTime !== null) {
        const boostElapsed = (t - m.boostTime) / 1000;
        if (boostElapsed < 2.5) {
          boostMult = 1.8 - (0.8 * boostElapsed / 2.5); // 1.8x -> 1x over 2.5s
        } else {
          m.boostTime = null;
        }
      }

      // Off-screen marbles get 1.5x velocity to catch up
      // Leading marble moves at 0.9x velocity
      const screenY = m.y - cameraY;
      const isOffScreen = screenY < -30 || screenY > canvas.height + 30;
      const isLeader = mi === leaderIdx;
      const speedMult = (isOffScreen ? 1.5 : isLeader ? 0.9 : 1.0) * boostMult;
      const targetVy = m.baseVy * speedMult;
      if (m.hitTime === null) {
        m.vy += (targetVy - m.vy) * (1 - Math.pow(boostMult > 1.2 ? 0.85 : 0.95, dt));
        m.vx *= Math.pow(0.97, dt);
      } else {
        m.vy += (targetVy - m.vy) * (1 - Math.pow(0.99, dt));
        m.vx *= Math.pow(0.99, dt);
      }

      m.vx += (Math.random() - 0.5) * 0.1 * dt;
      m.x += m.vx * dt;
      m.y += m.vy * dt;

      if (m.x - marbleR < trackLeft) { m.x = trackLeft + marbleR; m.vx = Math.abs(m.vx) * 0.8; }
      if (m.x + marbleR > trackLeft + trackWidth) { m.x = trackLeft + trackWidth - marbleR; m.vx = -Math.abs(m.vx) * 0.8; }

      // Circle obstacle collision
      obstacles.forEach(o => {
        const dx = m.x - o.x;
        const dy = m.y - o.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const minDist = marbleR + o.r;
        if (dist < minDist && dist > 0) {
          const nx = dx / dist, ny = dy / dist;
          m.x = o.x + nx * minDist;
          m.y = o.y + ny * minDist;
          const dot = m.vx * nx + m.vy * ny;
          m.vx -= 2 * dot * nx;
          m.vy -= 2 * dot * ny;
          const headOn = Math.abs(dot) / (Math.abs(m.vy) + Math.abs(m.vx) + 0.1);
          m.vx *= (0.7 + 0.3 * (1 - headOn));
          m.vy *= (0.7 + 0.3 * (1 - headOn));
          m.hitTime = t;
        }
      });

      // Triangle obstacle collision (approximate as circle)
      triangles.forEach(tri => {
        const dx = m.x - tri.x;
        const dy = m.y - tri.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const minDist = marbleR + tri.size * 0.6;
        if (dist < minDist && dist > 0) {
          const nx = dx / dist, ny = dy / dist;
          m.x = tri.x + nx * minDist;
          m.y = tri.y + ny * minDist;
          const dot = m.vx * nx + m.vy * ny;
          m.vx -= 2 * dot * nx;
          m.vy -= 2 * dot * ny;
          m.vx *= 0.75; m.vy *= 0.75;
          m.hitTime = t;
        }
      });

      // Marble-to-marble collision
      marbles.forEach(other => {
        if (other === m || other.finished) return;
        const dx = m.x - other.x;
        const dy = m.y - other.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const minDist = marbleR * 2;
        if (dist < minDist && dist > 0) {
          const nx = dx / dist, ny = dy / dist;
          // Separate
          const overlap = minDist - dist;
          m.x += nx * overlap * 0.5;
          m.y += ny * overlap * 0.5;
          other.x -= nx * overlap * 0.5;
          other.y -= ny * overlap * 0.5;
          // Elastic collision
          const dvx = m.vx - other.vx;
          const dvy = m.vy - other.vy;
          const dot = dvx * nx + dvy * ny;
          if (dot > 0) {
            m.vx -= dot * nx * 0.8;
            m.vy -= dot * ny * 0.8;
            other.vx += dot * nx * 0.8;
            other.vy += dot * ny * 0.8;
          }
        }
      });

      if (finishLineY !== null && m.y <= finishLineY && !m.finished) {
        m.finished = true;
        m.finishTime = t;
        sfx('finish');
        if (!winners) winners = [];
        winners.push(m);
      }
      // Track furthest point reached for stable map
      if (m.y < mapMinY) mapMinY = m.y;
    });

    // Spawn boost pads for losing marbles
    spawnBoostPads(t);

    // Draw boost pads — retro pixelated style
    boostPads.forEach(pad => {
      const sy = pad.y - cameraY;
      if (sy < -60 || sy > canvas.height + 60) return;
      const px = 4; // pixel block size
      const flash = Math.sin(glowPhase * 5) * 0.5 + 0.5;
      if (pad.used) {
        // Used pad: faded grey pixels
        ctx.fillStyle = 'rgba(80,80,80,0.2)';
        ctx.fillRect(pad.x, sy, pad.w, pad.h);
        ctx.strokeStyle = 'rgba(80,80,80,0.2)';
        ctx.lineWidth = 1;
        ctx.strokeRect(pad.x, sy, pad.w, pad.h);
      } else {
        // Active pad: neon pixel checkerboard
        const cols = Math.ceil(pad.w / px);
        const rows = Math.ceil(pad.h / px);
        for (let r = 0; r < rows; r++) {
          for (let c = 0; c < cols; c++) {
            const bright = (r + c) % 2 === 0;
            ctx.fillStyle = bright ? `rgba(0,255,100,${0.5 + flash * 0.3})` : `rgba(0,200,80,${0.3 + flash * 0.2})`;
            ctx.fillRect(pad.x + c * px, sy + r * px, px, px);
          }
        }
        // Pixel border
        ctx.fillStyle = `rgba(0,255,200,${0.7 + flash * 0.3})`;
        for (let c = 0; c < cols; c++) {
          ctx.fillRect(pad.x + c * px, sy, px, px); // top
          ctx.fillRect(pad.x + c * px, sy + pad.h - px, px, px); // bottom
        }
        for (let r = 0; r < rows; r++) {
          ctx.fillRect(pad.x, sy + r * px, px, px); // left
          ctx.fillRect(pad.x + pad.w - px, sy + r * px, px, px); // right
        }
        // Pixel arrows pointing up
        const arrowCount = Math.max(1, Math.floor(pad.w / (marbleR * 2)));
        const arrowSpacing = pad.w / (arrowCount + 1);
        ctx.fillStyle = '#fff';
        for (let a = 0; a < arrowCount; a++) {
          const ax = pad.x + arrowSpacing * (a + 1);
          const ay = sy + pad.h * 0.5;
          // Simple pixel arrow: 5 rows of pixels
          const apx = Math.max(3, px);
          ctx.fillRect(ax - apx/2, ay - apx * 2, apx, apx); // tip
          ctx.fillRect(ax - apx * 1.5, ay - apx, apx * 3, apx); // wide row
          ctx.fillRect(ax - apx/2, ay, apx, apx * 2); // shaft
        }
      }
    });

    // Draw circle obstacles — chunky 8-bit boulders
    obstacles.forEach(o => {
      const sy = o.y - cameraY;
      if (sy < -50 || sy > canvas.height + 50) return;
      const px = Math.max(6, Math.floor(o.r / 2)); // BIG chunky pixels
      const steps = Math.ceil(o.r * 2 / px);
      const pulse = Math.sin(glowPhase * 2 + o.x * 0.1) * 0.15;
      for (let gy = -steps/2; gy < steps/2; gy++) {
        for (let gx = -steps/2; gx < steps/2; gx++) {
          const cx = gx * px, cy = gy * px;
          if (cx*cx + cy*cy > o.r * o.r) continue;
          const ci = ((Math.floor(o.x + gx * 13) ^ Math.floor(o.y + gy * 7)) & 0xFF) % 5;
          const shade = [0.45, 0.38, 0.32, 0.50, 0.27][ci];
          const s = shade + pulse;
          ctx.fillStyle = `rgb(${Math.floor(s*180)},${Math.floor(s*170)},${Math.floor(s*150)})`;
          ctx.fillRect(o.x + cx - px/2, sy + cy - px/2, px, px);
        }
      }
      // 8-bit highlight: bright top-left pixels
      ctx.fillStyle = 'rgba(255,255,200,0.45)';
      ctx.fillRect(o.x - o.r * 0.4, sy - o.r * 0.5, px, px);
      ctx.fillRect(o.x - o.r * 0.2, sy - o.r * 0.6, px, px);
      // Dark shadow: bottom-right
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(o.x + o.r * 0.2, sy + o.r * 0.4, px, px);
      ctx.fillRect(o.x + o.r * 0.4, sy + o.r * 0.2, px, px);
      // Neon outline glow
      ctx.strokeStyle = `rgba(255,200,100,${0.15 + pulse})`;
      ctx.lineWidth = 2;
      ctx.strokeRect(o.x - o.r, sy - o.r, o.r * 2, o.r * 2);
    });

    // Draw triangle obstacles — neon 8-bit danger spikes
    triangles.forEach(tri => {
      const sy = tri.y - cameraY;
      if (sy < -50 || sy > canvas.height + 50) return;
      const s = tri.size;
      const px = Math.max(5, Math.floor(s / 3)); // chunky pixels
      const flash = Math.sin(glowPhase * 8 + tri.x) * 0.5 + 0.5;
      // Pixelated inverted triangle: row by row
      const rows = Math.ceil(s * 2 / px);
      for (let row = 0; row < rows; row++) {
        const rowY = sy - s + row * px;
        const progress = row / rows;
        const halfW = s * (1 - progress);
        const cols = Math.max(1, Math.ceil(halfW * 2 / px));
        for (let col = 0; col < cols; col++) {
          const colX = tri.x - halfW + col * px;
          const edge = (col === 0 || col === cols - 1 || row === 0 || row === rows - 1);
          if (edge) {
            // Neon border
            ctx.fillStyle = `rgba(255,${Math.floor(50 + flash * 100)},${Math.floor(50 + flash * 50)},${0.8 + flash * 0.2})`;
          } else {
            const ci = ((row * 3 + col * 7) ^ Math.floor(tri.x)) % 3;
            const colors = [`rgba(200,30,30,${0.7 + flash * 0.2})`, `rgba(170,20,20,${0.6 + flash * 0.2})`, `rgba(230,50,50,${0.8 + flash * 0.15})`];
            ctx.fillStyle = colors[ci];
          }
          ctx.fillRect(colX, rowY, px, px);
        }
      }
      // Pulsing danger glow around spike
      ctx.shadowColor = `rgba(255,0,0,${0.3 + flash * 0.4})`;
      ctx.shadowBlur = 8 + flash * 8;
      ctx.fillStyle = 'rgba(255,80,80,0.01)';
      ctx.fillRect(tri.x - 1, sy - 1, 2, 2);
      ctx.shadowBlur = 0;
      // Exclamation pixel at tip
      if (flash > 0.6) {
        ctx.fillStyle = '#fff';
        ctx.fillRect(tri.x - px/2, sy - s - px * 2, px, px * 1.5);
        ctx.fillRect(tri.x - px/2, sy - s - px * 0.3, px, px * 0.5);
      }
    });

    // Draw marbles
    marbles.forEach(m => {
      const sy = m.y - cameraY;
      if (sy < -30 || sy > canvas.height + 30) return;
      // Boost trail effect
      if (m.boostTime !== null) {
        const boostElapsed = (t - m.boostTime) / 1000;
        if (boostElapsed < 2.5) {
          const intensity = 1 - boostElapsed / 2.5;
          // Speed lines behind marble
          for (let s = 1; s <= 4; s++) {
            const trailAlpha = intensity * 0.3 * (1 - s / 5);
            ctx.beginPath();
            ctx.arc(m.x + (Math.random() - 0.5) * marbleR * 0.5, sy + s * marbleR * 0.8, marbleR * (1 - s * 0.15), 0, Math.PI * 2);
            ctx.fillStyle = `rgba(0,255,100,${trailAlpha})`;
            ctx.fill();
          }
          // Glow ring
          ctx.beginPath(); ctx.arc(m.x, sy, marbleR + 5 + intensity * 4, 0, Math.PI * 2);
          ctx.strokeStyle = `rgba(0,255,100,${intensity * 0.6})`;
          ctx.lineWidth = 2;
          ctx.stroke();
        }
      }
      drawMarble(m, sy);
    });

    // Start line
    const startLineY = 0 - cameraY;
    if (startLineY > -20 && startLineY < canvas.height + 20) {
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(trackLeft - 10, startLineY); ctx.lineTo(trackLeft + trackWidth + 10, startLineY); ctx.stroke();
    }

    // Side background - dark wood
    ctx.fillStyle = '#2A1A0A';
    ctx.fillRect(0, 0, trackLeft - 14, canvas.height);
    ctx.fillRect(trackLeft + trackWidth + 14, 0, canvas.width, canvas.height);

    // === MINI TRACK MAP ===
    // Draw on the left side panel
    const mapMargin = 8;
    const mapX = mapMargin;
    const mapW = trackLeft - 20 - mapMargin;
    const mapTop = 90; // well below Back button
    const mapBottom = canvas.height - 20;
    const mapH = mapBottom - mapTop;
    if (mapW > 20 && mapH > 100) {
      // Map background
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(mapX, mapTop, mapW, mapH);
      ctx.strokeStyle = 'rgba(0,255,200,0.3)';
      ctx.lineWidth = 1;
      ctx.strokeRect(mapX, mapTop, mapW, mapH);
      // Title
      ctx.fillStyle = '#0f8';
      ctx.font = `bold ${Math.max(8, Math.min(mapW * 0.22, 11))}px monospace`;
      ctx.textAlign = 'center';
      ctx.fillText('TRACK', mapX + mapW / 2, mapTop - 3);
      // Track lane inside map
      const mapTrackX = mapX + mapW * 0.2;
      const mapTrackW = mapW * 0.6;
      ctx.fillStyle = 'rgba(139,111,71,0.4)';
      ctx.fillRect(mapTrackX, mapTop + 4, mapTrackW, mapH - 8);
      // Race extent: accurate mapping from start to finish
      const raceStart = 0;
      let targetEnd;
      if (finishLineY !== null) {
        // Finish is known — use it as the definitive end
        targetEnd = finishLineY;
      } else {
        // Before finish: leader is at mapMinY, estimate finish from elapsed time
        // Race lasts ~20s, leader at mapMinY = elapsed/20 of the way
        const pctDone = Math.max(0.05, Math.min(0.95, elapsed / 21));
        targetEnd = mapMinY / pctDone; // project where finish will be
      }
      // Smooth the race end so it never jumps
      if (smoothRaceEnd === null) smoothRaceEnd = targetEnd;
      const lerpSpeed = finishLineY !== null ? 0.08 : 0.03;
      smoothRaceEnd += (targetEnd - smoothRaceEnd) * lerpSpeed;
      const raceEnd = smoothRaceEnd;
      const raceLen = Math.max(Math.abs(raceEnd - raceStart), 100);
      // Map y-coordinate helper: world y → map y (bottom=start, top=finish)
      function worldToMapY(wy) {
        const progress = Math.min(1, Math.max(0, (raceStart - wy) / raceLen));
        return mapTop + 6 + (1 - progress) * (mapH - 12);
      }
      // Start/finish markers
      const startMY = worldToMapY(raceStart);
      // Start line
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(mapTrackX, startMY); ctx.lineTo(mapTrackX + mapTrackW, startMY); ctx.stroke();
      ctx.fillStyle = '#888';
      ctx.font = `${Math.max(6, Math.min(mapW * 0.16, 8))}px monospace`;
      ctx.fillText('START', mapX + mapW / 2, startMY + 8);
      // Finish line (if spawned) — always use actual finishLineY position
      if (finishLineY !== null) {
        const finishMY = worldToMapY(finishLineY);
        ctx.strokeStyle = '#ff0';
        ctx.setLineDash([2, 2]);
        ctx.beginPath(); ctx.moveTo(mapTrackX, finishMY); ctx.lineTo(mapTrackX + mapTrackW, finishMY); ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle = '#ff0';
        ctx.fillText('FINISH', mapX + mapW / 2, finishMY - 3);
      }
      // Halfway line (if shown)
      if (halfwayLineY !== null) {
        const halfMY = worldToMapY(halfwayLineY);
        ctx.strokeStyle = 'rgba(255,255,0,0.3)';
        ctx.setLineDash([2, 2]);
        ctx.beginPath(); ctx.moveTo(mapTrackX, halfMY); ctx.lineTo(mapTrackX + mapTrackW, halfMY); ctx.stroke();
        ctx.setLineDash([]);
      }
      // Draw marble dots on map
      const sortedForMap = [...marbles].sort((a, b) => a.y - b.y);
      const showNames = mapW > 50;
      sortedForMap.forEach((m, idx) => {
        const my = worldToMapY(m.y);
        const clampedY = Math.max(mapTop + 4, Math.min(mapBottom - 4, my));
        const dotR = showNames ? Math.max(3, Math.min(mapW * 0.12, 6)) : Math.max(4, Math.min(mapW * 0.18, 8));
        const dotCx = showNames ? mapX + mapW * 0.35 : mapX + mapW / 2;
        // Glow for leader
        if (idx === 0) {
          ctx.shadowColor = m.color;
          ctx.shadowBlur = 6;
        }
        ctx.fillStyle = m.color;
        ctx.beginPath();
        ctx.arc(dotCx, clampedY, dotR, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
        if (showNames) {
          // Name label to right of dot
          ctx.fillStyle = '#ccc';
          ctx.font = `${Math.max(7, Math.min(mapW * 0.16, 9))}px monospace`;
          ctx.textAlign = 'left';
          const nameLabel = m.name.length > 6 ? m.name.substring(0, 5) + '..' : m.name;
          ctx.fillText(nameLabel, dotCx + dotR + 2, clampedY + 3);
          ctx.textAlign = 'center';
        } else {
          // On narrow maps, show position number inside/next to dot
          ctx.fillStyle = '#fff';
          ctx.font = `bold ${Math.max(6, dotR * 1.4)}px monospace`;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(String(idx + 1), dotCx, clampedY);
          ctx.textBaseline = 'alphabetic';
        }
      });
    }

    updateScoreboard();

    if (winners && winners.length >= playersPicked) {
      const picked = winners.slice(0, playersPicked).map(w => w.name);
      captureCanvasMoment('marbleCanvas', picked.join(', '));
      setTimeout(() => { resetGame(); showWinner(picked.length === 1 ? picked[0] : picked); }, 2000);
      return;
    }
    marbleState.raf = requestAnimationFrame(frame);
  }
  marbleState.raf = requestAnimationFrame(frame);
}

// ============ GAME 4: BALLOONS ============
let balloonState = null;

function initBalloon() {
  showScreen('balloonScreen');
  const n = players.length;
  const svg = document.getElementById('balloonSvg');
  const bc = document.getElementById('burstCanvas');
  bc.width = bc.parentElement.offsetWidth || 600;
  bc.height = bc.parentElement.offsetHeight || 500;

  // Fixed viewBox with proper aspect ratio preservation
  const vbW = 600;
  const vbH = 420;
  svg.setAttribute('viewBox', `0 0 ${vbW} ${vbH}`);
  svg.setAttribute('preserveAspectRatio', 'xMidYMax meet');

  const spacing = vbW / n;
  const fontSize = n > 8 ? 9 : n > 5 ? 11 : 14;
  const labelY = Math.round(vbH * 0.95); // player names at very bottom
  const stringEndY = labelY - fontSize - 8; // strings end clearly above names
  const startBalloonY = Math.round(vbH * 0.35); // balloons start ~35% from top

  // Background scenery — all blue sky, no grass
  let svgContent = '';
  // Full sky background
  svgContent += `<rect x="0" y="0" width="${vbW}" height="${vbH}" fill="#87CEEB"/>`;
  // Sun
  svgContent += '<circle cx="520" cy="60" r="35" fill="#FFD700" opacity="0.9"/>';
  svgContent += '<circle cx="520" cy="60" r="42" fill="none" stroke="#FFD700" stroke-width="3" opacity="0.3"/>';
  for (let i = 0; i < 8; i++) {
    const angle = i * Math.PI / 4;
    const x1 = 520 + Math.cos(angle) * 48, y1 = 60 + Math.sin(angle) * 48;
    const x2 = 520 + Math.cos(angle) * 62, y2 = 60 + Math.sin(angle) * 62;
    svgContent += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="#FFD700" stroke-width="3" opacity="0.5"/>`;
  }
  // Clouds
  svgContent += '<g opacity="0.7"><ellipse cx="120" cy="55" rx="40" ry="18" fill="#fff"/><ellipse cx="150" cy="48" rx="30" ry="15" fill="#fff"/><ellipse cx="95" cy="50" rx="25" ry="13" fill="#fff"/></g>';
  svgContent += '<g opacity="0.5"><ellipse cx="350" cy="80" rx="35" ry="14" fill="#fff"/><ellipse cx="375" cy="74" rx="25" ry="12" fill="#fff"/><ellipse cx="330" cy="76" rx="20" ry="10" fill="#fff"/></g>';
  svgContent += '<g opacity="0.4"><ellipse cx="480" cy="110" rx="28" ry="11" fill="#fff"/><ellipse cx="500" cy="106" rx="20" ry="9" fill="#fff"/></g>';

  // Balloons — ensure at least one has high growth rate to reach MASSIVE
  const growthRates = [];
  for (let i = 0; i < n; i++) growthRates.push(0.5 + Math.random() * 0.7);
  // Guarantee one balloon grows fast enough to reach massive
  growthRates[Math.floor(Math.random() * n)] = 1.3 + Math.random() * 0.3;

  const balloons = [];
  for (let i = 0; i < n; i++) {
    const cx = spacing * i + spacing / 2;
    const color = BALLOON_COLORS[i % BALLOON_COLORS.length];
    svgContent += `
      <g id="bGroup${i}">
        <text class="balloon-label" x="${cx}" y="${labelY}" font-size="${fontSize}">${players[i].length > 8 ? players[i].substring(0,7) + '..' : players[i]}</text>
        <line id="bString${i}" x1="${cx}" y1="${startBalloonY + 16}" x2="${cx}" y2="${stringEndY}" stroke="#555" stroke-width="1.5"/>
        <ellipse id="bShape${i}" cx="${cx}" cy="${startBalloonY}" rx="8" ry="10" fill="${color}" opacity="0.9"/>
        <ellipse id="bShine${i}" cx="${cx}" cy="${startBalloonY}" rx="5" ry="6" fill="rgba(255,255,255,0.2)"/>
        <polygon id="bKnot${i}" points="${cx-3},${startBalloonY+10} ${cx+3},${startBalloonY+10} ${cx},${startBalloonY+16}" fill="${color}"/>
      </g>`;
    balloons.push({ idx: i, cx, color, alive: true, rx: 8, ry: 10, cy: startBalloonY, growthRate: growthRates[i], burstRx: 0 });
  }
  svg.innerHTML = svgContent;

  // Schedule ALL n bursts within 10 seconds
  const burstTimes = [];
  for (let i = 0; i < n; i++) {
    burstTimes.push(2000 + Math.random() * 13000);
  }
  burstTimes.sort((a, b) => a - b);

  balloonState = {
    balloons, phase: 'inflating', raf: null, startTime: null,
    burstTimes, nextBurstIdx: 0, groundY: stringEndY,
    baseInflateRate: 0.04, maxRx: 45, maxRy: 55,
    flashText: null, flashStart: 0, flashColor: '#fff', flashName: ''
  };
  document.getElementById('balloonStatus').textContent = '';
  balloonState.startTime = performance.now();
  balloonState.raf = requestAnimationFrame(balloonGameLoop);
  currentGameCleanup = cleanupBalloon;
}

function cleanupBalloon() {
  if (balloonState && balloonState.raf) cancelAnimationFrame(balloonState.raf);
  balloonState = null;
}

function getSizeWord(rx, maxRx) {
  const ratio = rx / maxRx;
  if (ratio < 0.15) return 'Tiny!';
  if (ratio < 0.3) return 'Puny!';
  if (ratio < 0.45) return 'Meh';
  if (ratio < 0.6) return 'Big!';
  if (ratio < 0.75) return 'Huge!';
  if (ratio < 0.9) return 'MASSIVE!';
  return 'GIGANTIC!';
}

function balloonGameLoop(t) {
  if (!balloonState) return;
  const s = balloonState;
  const elapsed = t - s.startTime;

  // Draw flash overlay on burst canvas (gentle)
  const bc = document.getElementById('burstCanvas');
  const bctx = bc.getContext('2d');
  bctx.clearRect(0, 0, bc.width, bc.height);
  if (s.flashText && t - s.flashStart < 1500) {
    const flashElapsed = t - s.flashStart;
    const alpha = flashElapsed < 300 ? flashElapsed / 300 * 0.85 : Math.max(0, 0.85 * (1 - (flashElapsed - 300) / 1200));
    // Gentle color tint instead of white flash
    if (flashElapsed < 100) {
      bctx.fillStyle = `rgba(255,255,255,${0.12 * (1 - flashElapsed / 100)})`;
      bctx.fillRect(0, 0, bc.width, bc.height);
    }
    bctx.globalAlpha = alpha;
    bctx.fillStyle = s.flashColor;
    bctx.font = 'bold 50px Georgia';
    bctx.textAlign = 'center';
    bctx.shadowColor = 'rgba(0,0,0,0.4)';
    bctx.shadowBlur = 8;
    bctx.fillText(s.flashText, bc.width / 2, bc.height * 0.3);
    bctx.font = '20px Georgia';
    bctx.fillText(s.flashName || '', bc.width / 2, bc.height * 0.3 + 35);
    bctx.shadowBlur = 0;
    bctx.globalAlpha = 1;
  }

  if (s.phase === 'done') {
    s.raf = requestAnimationFrame(balloonGameLoop);
    return;
  }
  if (s.phase !== 'inflating') {
    s.raf = requestAnimationFrame(balloonGameLoop);
    return;
  }

  const alive = s.balloons.filter(b => b.alive);
  const initCy = 200;

  // Auto-inflate all alive balloons at different rates
  alive.forEach(b => {
    if (b.rx < s.maxRx) {
      const rate = s.baseInflateRate * b.growthRate;
      b.rx += rate;
      b.ry += rate * 1.2;
      b.cy = initCy - (b.ry - 10) * 0.5;
      const shape = document.getElementById('bShape' + b.idx);
      const shine = document.getElementById('bShine' + b.idx);
      const knot = document.getElementById('bKnot' + b.idx);
      const str = document.getElementById('bString' + b.idx);
      if (shape) {
        shape.setAttribute('rx', b.rx);
        shape.setAttribute('ry', b.ry);
        shape.setAttribute('cy', b.cy);
        shine.setAttribute('cx', b.cx);
        shine.setAttribute('cy', b.cy);
        shine.setAttribute('rx', b.rx * 0.6);
        shine.setAttribute('ry', b.ry * 0.6);
        const knotY = b.cy + b.ry;
        knot.setAttribute('points', `${b.cx-3},${knotY} ${b.cx+3},${knotY} ${b.cx},${knotY+6}`);
        str.setAttribute('x1', b.cx);
        str.setAttribute('y1', knotY + 6);
      }
    }
    const shape = document.getElementById('bShape' + b.idx);
    if (shape) {
      const wobble = Math.sin(t / 300 + b.idx * 1.5) * 2;
      shape.setAttribute('cx', b.cx + wobble);
    }
  });

  // Burst at pre-scheduled times — all balloons pop
  if (s.nextBurstIdx < s.burstTimes.length && elapsed >= s.burstTimes[s.nextBurstIdx]) {
    if (alive.length > 0) {
      const victim = alive[Math.floor(Math.random() * alive.length)];
      burstBalloon(victim, s);
      s.nextBurstIdx++;
      const remaining = s.balloons.filter(b => b.alive);
      if (remaining.length === 0) {
        // All popped — wait for last burst flash to show, then display recap
        s.phase = 'lastflash';
        // Sort balloons by burst size descending, pick top N
        const sorted = [...s.balloons].sort((a, b) => b.burstRx - a.burstRx);
        const winnerIndices = new Set(sorted.slice(0, playersPicked).map(b => b.idx));
        s.winnerIndices = winnerIndices;
        // After flash finishes (1.8s), show translucent recap
        setTimeout(() => {
          if (!balloonState) return;
          s.phase = 'done';
          const svg = document.getElementById('balloonSvg');
          s.balloons.forEach(b => {
            const group = document.getElementById('bGroup' + b.idx);
            if (!group) return;
            group.style.opacity = '1';
            const isWinner = winnerIndices.has(b.idx);
            const burstRy = b.burstRx * 1.2;
            const initCy = 200;
            const cy = initCy - (burstRy - 10) * 0.5;
            const shape = document.getElementById('bShape' + b.idx);
            const shine = document.getElementById('bShine' + b.idx);
            const knot = document.getElementById('bKnot' + b.idx);
            const str = document.getElementById('bString' + b.idx);
            if (shape) {
              shape.style.display = '';
              shape.setAttribute('rx', b.burstRx);
              shape.setAttribute('ry', burstRy);
              shape.setAttribute('cy', cy);
              shape.setAttribute('cx', b.cx);
              shape.setAttribute('opacity', isWinner ? '0.9' : '0.25');
              if (isWinner) shape.setAttribute('stroke', '#FFD700');
              if (isWinner) shape.setAttribute('stroke-width', '3');
            }
            if (shine) {
              shine.style.display = isWinner ? '' : 'none';
              shine.setAttribute('cx', b.cx);
              shine.setAttribute('cy', cy);
              shine.setAttribute('rx', b.burstRx * 0.6);
              shine.setAttribute('ry', burstRy * 0.6);
            }
            if (knot) {
              knot.style.display = '';
              const knotY = cy + burstRy;
              knot.setAttribute('points', `${b.cx-3},${knotY} ${b.cx+3},${knotY} ${b.cx},${knotY+6}`);
              knot.setAttribute('opacity', isWinner ? '0.9' : '0.25');
            }
            if (str) {
              str.style.display = '';
              str.setAttribute('y1', cy + burstRy + 6);
              str.setAttribute('opacity', isWinner ? '0.9' : '0.25');
            }
            const label = group.querySelector('.balloon-label');
            if (label) {
              label.setAttribute('fill', isWinner ? '#FFD700' : 'rgba(255,255,255,0.3)');
              label.setAttribute('font-weight', isWinner ? 'bold' : 'normal');
              label.setAttribute('font-size', isWinner ? '16px' : '11px');
            }
          });
          // Add crown to each winner
          winnerIndices.forEach(wIdx => {
            const winB = s.balloons[wIdx];
            const winCy = 200 - (winB.burstRx * 1.2 - 10) * 0.5;
            const crownY = winCy - winB.burstRx * 1.2 - 15;
            const crown = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            crown.setAttribute('x', winB.cx);
            crown.setAttribute('y', crownY);
            crown.setAttribute('text-anchor', 'middle');
            crown.setAttribute('font-size', '24');
            crown.textContent = '👑';
            svg.appendChild(crown);
          });
          const picked = sorted.slice(0, playersPicked).map(b => players[b.idx]);
          captureSvgMoment('balloonSvg');
          setTimeout(() => { resetGame(); showWinner(picked.length === 1 ? picked[0] : picked); }, 4000);
        }, 1800);
        return;
      }
    }
  }

  s.raf = requestAnimationFrame(balloonGameLoop);
}

function burstBalloon(b, s) {
  sfx('pop');
  b.alive = false;
  b.burstRx = b.rx;
  const group = document.getElementById('bGroup' + b.idx);
  if (group) group.style.opacity = '0.15';
  const shape = document.getElementById('bShape' + b.idx);
  const shine = document.getElementById('bShine' + b.idx);
  const knot = document.getElementById('bKnot' + b.idx);
  const str = document.getElementById('bString' + b.idx);
  if (shape) shape.style.display = 'none';
  if (shine) shine.style.display = 'none';
  if (knot) knot.style.display = 'none';
  if (str) str.style.display = 'none';
  const sizeWord = getSizeWord(b.rx, s.maxRx);
  s.flashText = sizeWord;
  s.flashName = players[b.idx];
  s.flashColor = b.color;
  s.flashStart = performance.now();
}

// ============ GAME 5: GOLF ============
let golfState = null;

function initGolf() {
  showScreen('golfScreen');
  const canvas = document.getElementById('golfCanvas');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const ballR = 10;
  const holeX = W * 0.2 + Math.random() * W * 0.6;
  const holeY = H * 0.15 + Math.random() * H * 0.55;
  const holeR = 14;

  const balls = players.map((p, i) => ({
    x: W / 2 + (i - players.length / 2) * 25,
    y: H + 20,
    vx: 0, vy: 0,
    color: COLORS[i],
    name: p,
    stopped: false
  }));

  golfState = {
    phase: 'swing', balls, holeX, holeY, holeR, ballR,
    swingStart: performance.now(), raf: null, winner: -1, doneTime: 0
  };

  const ad = document.getElementById('golfAssignments');
  ad.innerHTML = '<h4 style="color:#4CAF50;margin-bottom:6px">Players</h4>' +
    players.map((p, i) => `<div style="display:flex;align-items:center;gap:6px;margin:3px 0"><div style="width:14px;height:14px;border-radius:50%;background:${COLORS[i]};border:2px solid rgba(255,255,255,0.5)"></div><span style="color:#fff">${p}</span></div>`).join('');
  document.getElementById('golfStatus').textContent = '';

  currentGameCleanup = () => {
    if (golfState && golfState.raf) cancelAnimationFrame(golfState.raf);
    golfState = null;
  };

  // Pre-generate dark patches for course texture
  const patches = [];
  for (let i = 0; i < 12; i++) {
    patches.push({ x: Math.random() * W, y: Math.random() * H, r: 30 + Math.random() * 50 });
  }

  function frame(t) {
    ctx.clearRect(0, 0, W, H);
    const g = golfState;
    if (!g) return;

    // Draw green course
    ctx.fillStyle = '#388E3C';
    ctx.fillRect(0, 0, W, H);
    // Subtle darker patches
    patches.forEach(p => {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(0,80,0,0.12)';
      ctx.fill();
    });
    // Lighter strip pattern
    ctx.fillStyle = 'rgba(100,200,100,0.06)';
    for (let i = 0; i < W; i += 60) {
      if ((i / 60) % 2 === 0) ctx.fillRect(i, 0, 30, H);
    }

    // Draw hole
    ctx.beginPath();
    ctx.arc(g.holeX, g.holeY, g.holeR + 4, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(g.holeX, g.holeY, g.holeR, 0, Math.PI * 2);
    ctx.fillStyle = '#111';
    ctx.fill();
    ctx.strokeStyle = '#555';
    ctx.lineWidth = 2;
    ctx.stroke();
    // Flag pole
    ctx.beginPath();
    ctx.moveTo(g.holeX, g.holeY);
    ctx.lineTo(g.holeX, g.holeY - 70);
    ctx.strokeStyle = '#888';
    ctx.lineWidth = 2;
    ctx.stroke();
    // Flag
    ctx.beginPath();
    ctx.moveTo(g.holeX + 1, g.holeY - 70);
    ctx.lineTo(g.holeX + 30, g.holeY - 60);
    ctx.lineTo(g.holeX + 1, g.holeY - 50);
    ctx.closePath();
    ctx.fillStyle = '#e94560';
    ctx.fill();

    // Swing phase
    if (g.phase === 'swing') {
      const elapsed = (t - g.swingStart) / 1000;
      if (elapsed < 1) {
        const swingT = Math.min(elapsed / 0.8, 1);
        const clubAngle = -Math.PI * 0.3 + swingT * Math.PI * 0.6;
        const cx = W / 2, cy = H - 20;
        const cLen = 100;
        const hx = cx + Math.cos(clubAngle) * cLen;
        const hy = cy + Math.sin(clubAngle) * cLen;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(hx, hy);
        ctx.strokeStyle = '#8B4513';
        ctx.lineWidth = 5;
        ctx.stroke();
        const perpX = -Math.sin(clubAngle) * 15;
        const perpY = Math.cos(clubAngle) * 15;
        ctx.beginPath();
        ctx.moveTo(hx - perpX, hy - perpY);
        ctx.lineTo(hx + perpX, hy + perpY);
        ctx.strokeStyle = '#C0C0C0';
        ctx.lineWidth = 8;
        ctx.lineCap = 'round';
        ctx.stroke();
        ctx.lineCap = 'butt';
      } else {
        g.phase = 'flying';
        g.balls.forEach(b => {
          const angleToHole = Math.atan2(g.holeY - H, g.holeX - W / 2);
          const spread = (Math.random() - 0.5) * 1.4;
          const speed = 10 + Math.random() * 8;
          b.vx = Math.cos(angleToHole + spread) * speed;
          b.vy = Math.sin(angleToHole + spread) * speed;
          b.x = W / 2 + (Math.random() - 0.5) * 30;
          b.y = H - 10;
        });
      }
    }

    // Physics
    if (g.phase === 'flying') {
      const friction = 0.993;
      let allStopped = true;

      g.balls.forEach(b => {
        if (b.stopped) return;
        b.x += b.vx;
        b.y += b.vy;
        b.vx *= friction;
        b.vy *= friction;
        if (b.x < ballR) { b.x = ballR; b.vx = Math.abs(b.vx) * 0.6; }
        if (b.x > W - ballR) { b.x = W - ballR; b.vx = -Math.abs(b.vx) * 0.6; }
        if (b.y < ballR) { b.y = ballR; b.vy = Math.abs(b.vy) * 0.6; }
        if (b.y > H - ballR) { b.y = H - ballR; b.vy = -Math.abs(b.vy) * 0.6; }
        if (Math.abs(b.vx) < 0.08 && Math.abs(b.vy) < 0.08) {
          b.vx = 0; b.vy = 0; b.stopped = true;
        } else { allStopped = false; }
      });

      // Ball-to-ball collisions
      for (let i = 0; i < g.balls.length; i++) {
        for (let j = i + 1; j < g.balls.length; j++) {
          const a = g.balls[i], b2 = g.balls[j];
          if (a.stopped && b2.stopped) continue;
          const dx = b2.x - a.x, dy = b2.y - a.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < ballR * 2 && dist > 0) {
            const nx = dx / dist, ny = dy / dist;
            const overlap = ballR * 2 - dist;
            a.x -= nx * overlap * 0.5;
            a.y -= ny * overlap * 0.5;
            b2.x += nx * overlap * 0.5;
            b2.y += ny * overlap * 0.5;
            const dvx = a.vx - b2.vx, dvy = a.vy - b2.vy;
            const dot = dvx * nx + dvy * ny;
            if (dot > 0) {
              a.vx -= dot * nx * 0.5; a.vy -= dot * ny * 0.5;
              b2.vx += dot * nx * 0.5; b2.vy += dot * ny * 0.5;
            }
            a.stopped = false; b2.stopped = false;
          }
        }
      }

      if (allStopped) {
        g.phase = 'done';
        // Sort balls by distance to hole, pick closest N
        const ranked = g.balls.map((b, i) => ({ idx: i, dist: Math.sqrt((b.x - g.holeX) ** 2 + (b.y - g.holeY) ** 2) }));
        ranked.sort((a, b) => a.dist - b.dist);
        g.winners = ranked.slice(0, playersPicked).map(r => r.idx);
        g.winner = g.winners[0]; // keep for animation compat
        g.doneTime = t;
      }
    }

    // Draw balls
    g.balls.forEach(b => {
      if (b.y > H + 15) return;
      ctx.beginPath();
      ctx.ellipse(b.x + 2, b.y + 2, ballR, ballR * 0.7, 0, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(0,0,0,0.2)';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(b.x, b.y, ballR, 0, Math.PI * 2);
      const bGrad = ctx.createRadialGradient(b.x - 3, b.y - 3, 1, b.x, b.y, ballR);
      bGrad.addColorStop(0, '#fff');
      bGrad.addColorStop(0.5, b.color);
      bGrad.addColorStop(1, b.color);
      ctx.fillStyle = bGrad;
      ctx.fill();
      ctx.strokeStyle = 'rgba(0,0,0,0.3)';
      ctx.lineWidth = 1;
      ctx.stroke();
    });

    // Done: dotted line + winner glow animation
    if (g.phase === 'done') {
      const glowT = (t - g.doneTime) / 1000;
      const winSet = new Set(g.winners);

      g.winners.forEach(wi => {
        const wb = g.balls[wi];
        // Dotted line from hole to winner
        ctx.setLineDash([8, 5]);
        ctx.beginPath();
        ctx.moveTo(g.holeX, g.holeY);
        ctx.lineTo(wb.x, wb.y);
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 3;
        ctx.shadowColor = '#fff';
        ctx.shadowBlur = 6;
        ctx.stroke();
        ctx.shadowBlur = 0;
        ctx.setLineDash([]);

        // Pulsing glow around winning ball
        const glowSize = 8 + Math.sin(glowT * 6) * 6;
        const glowAlpha = 0.4 + Math.sin(glowT * 6) * 0.2;
        ctx.beginPath();
        ctx.arc(wb.x, wb.y, ballR + glowSize, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${glowAlpha})`;
        ctx.shadowColor = wb.color;
        ctx.shadowBlur = 25 + Math.sin(glowT * 6) * 15;
        ctx.fill();
        ctx.shadowBlur = 0;

        // Redraw winning ball slightly larger with glow
        const scale = 1.0 + 0.15 * Math.sin(glowT * 4);
        const r = ballR * scale;
        ctx.beginPath();
        ctx.arc(wb.x, wb.y, r, 0, Math.PI * 2);
        const wGrad = ctx.createRadialGradient(wb.x - 3, wb.y - 3, 1, wb.x, wb.y, r);
        wGrad.addColorStop(0, '#fff');
        wGrad.addColorStop(0.4, wb.color);
        wGrad.addColorStop(1, wb.color);
        ctx.fillStyle = wGrad;
        ctx.shadowColor = wb.color;
        ctx.shadowBlur = 20;
        ctx.fill();
        ctx.shadowBlur = 0;

        // Sparkle particles
        for (let i = 0; i < 6; i++) {
          const angle = glowT * 3 + i * Math.PI / 3;
          const dist = ballR + 12 + Math.sin(glowT * 5 + i) * 8;
          const sx = wb.x + Math.cos(angle) * dist;
          const sy = wb.y + Math.sin(angle) * dist;
          const sparkR = 1.5 + Math.sin(glowT * 8 + i * 2) * 1;
          ctx.beginPath();
          ctx.arc(sx, sy, sparkR, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255,255,255,${0.5 + Math.sin(glowT * 8 + i) * 0.3})`;
          ctx.fill();
        }
      });

      const winNames = g.winners.map(wi => g.balls[wi].name);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 28px sans-serif';
      ctx.textAlign = 'center';
      ctx.shadowColor = g.balls[g.winners[0]].color;
      ctx.shadowBlur = 15;
      ctx.fillText(winNames.join(', ') + (winNames.length > 1 ? ' are closest!' : ' is closest!'), W / 2, 50);
      ctx.shadowBlur = 0;

      if (t - g.doneTime > 3000) {
        captureCanvasMoment('golfCanvas', winNames.join(', '));
        resetGame();
        showWinner(winNames.length === 1 ? winNames[0] : winNames);
        return;
      }
    }

    g.raf = requestAnimationFrame(frame);
  }

  golfState.raf = requestAnimationFrame(frame);
}

// ============ GAME 6: BATTLE ============
let battleState = null;

const CHAR_TYPES = [
  { name: 'Ninja', bodyColor: '#1a1a1a', trimColor: '#e94560', weapon: 'katana', female: false },
  { name: 'Swordsman', bodyColor: '#708090', trimColor: '#3498db', weapon: 'broadsword', female: false },
  { name: 'Archer', bodyColor: '#228B22', trimColor: '#8B4513', weapon: 'bow', female: false },
  { name: 'Assassin', bodyColor: '#2d1b4e', trimColor: '#9b59b6', weapon: 'dagger', female: false },
  { name: 'Kunoichi', bodyColor: '#1a1a1a', trimColor: '#ff69b4', weapon: 'katana', female: true },
  { name: 'Valkyrie', bodyColor: '#708090', trimColor: '#87CEEB', weapon: 'broadsword', female: true },
  { name: 'Huntress', bodyColor: '#228B22', trimColor: '#d4af37', weapon: 'bow', female: true },
  { name: 'Shadow', bodyColor: '#2d1b4e', trimColor: '#dda0dd', weapon: 'dagger', female: true }
];

function initBattle() {
  showScreen('battleScreen');
  const canvas = document.getElementById('battleCanvas');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const groundY = H * 0.72;

  // Pre-generate stars
  const stars = [];
  for (let i = 0; i < 50; i++) {
    stars.push({ x: Math.random() * W, y: Math.random() * groundY * 0.6, size: 0.5 + Math.random() * 1.5, twinkleSpeed: 2 + Math.random() * 4, phase: Math.random() * Math.PI * 2 });
  }
  // Shooting stars state
  const shootingStars = [];
  let lastShootingStar = 0;

  const chars = players.map((p, i) => {
    const type = CHAR_TYPES[i % CHAR_TYPES.length];
    const fromLeft = i % 2 === 0;
    return {
      name: p,
      type: type,
      x: fromLeft ? -60 - i * 30 : W + 60 + i * 30,
      targetX: W * 0.2 + (i / Math.max(players.length - 1, 1)) * W * 0.6,
      y: groundY,
      baseY: groundY,
      jumpY: 0,
      jumpVY: 0,
      isJumping: false,
      nextJumpTime: performance.now() + 1000 + Math.random() * 2000,
      facing: fromLeft ? 1 : -1,
      alive: true,
      lives: 2,
      injured: false,
      injuredTime: 0,
      bouncingBack: false,
      bounceVX: 0,
      bounceVY: 0,
      deathTime: null,
      attackPhase: Math.random() * Math.PI * 2,
      opacity: 1,
      rotation: 0,
      moveTimer: Math.random() * 1000
    };
  });

  battleState = {
    phase: 'intro',
    introStart: performance.now(),
    introIdx: 0,
    countdownStart: 0,
    chars,
    stars,
    shootingStars,
    lastShootingStar: 0,
    raf: null,
    lastKillTime: 0,
    killInterval: (30 / players.length) * 1000,
    fightStart: 0,
    winner: null,
    doneTime: 0
  };

  const info = document.getElementById('battleInfo');
  info.innerHTML = '<h4 style="color:#e94560;margin-bottom:6px">Warriors</h4>' +
    chars.map(c => `<div id="bi_${c.name.replace(/\s/g,'_')}" style="display:flex;align-items:center;gap:6px;margin:3px 0"><div style="width:12px;height:12px;background:${c.type.trimColor};border-radius:2px"></div>${c.name} <span id="bl_${c.name.replace(/\s/g,'_')}" style="color:#e94560;font-size:0.8em">♥♥</span></div>`).join('');
  document.getElementById('battleStatus').textContent = '';

  currentGameCleanup = () => {
    if (battleState && battleState.raf) cancelAnimationFrame(battleState.raf);
    battleState = null;
  };

  function drawCharacter(c, t) {
    if (!c.alive && c.opacity <= 0) return;
    const ct = c.type;
    const h = 60;

    ctx.save();
    ctx.globalAlpha = c.opacity;
    ctx.translate(c.x, c.y - c.jumpY);
    ctx.rotate(c.rotation);
    ctx.scale(c.facing, 1);

    // Legs with walk cycle
    const walkCycle = c.alive ? Math.sin(t * 0.003 + c.attackPhase) * 5 : 0;
    ctx.strokeStyle = ct.bodyColor;
    ctx.lineWidth = ct.female ? 3 : 4;
    ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(-8, h * 0.35 + walkCycle); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(8, h * 0.35 - walkCycle); ctx.stroke();
    // Boots
    ctx.fillStyle = ct.female ? ct.trimColor : '#333';
    ctx.fillRect(-12, h * 0.3 + walkCycle - 2, 8, 5);
    ctx.fillRect(4, h * 0.3 - walkCycle - 2, 8, 5);

    // Body — female chars are slightly slimmer
    const bodyW = ct.female ? 20 : 24;
    const bodyX = -bodyW / 2;
    ctx.fillStyle = ct.bodyColor;
    ctx.fillRect(bodyX, -h * 0.35, bodyW, h * 0.4);
    // Belt/trim
    ctx.fillStyle = ct.trimColor;
    ctx.fillRect(bodyX, -h * 0.05, bodyW, 5);

    // Head
    ctx.beginPath();
    ctx.arc(0, -h * 0.45, 10, 0, Math.PI * 2);
    ctx.fillStyle = '#f0c8a0';
    ctx.fill();

    // Female hair — longer flowing arcs from head
    if (ct.female) {
      ctx.strokeStyle = '#333';
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.moveTo(-8, -h * 0.5);
      ctx.quadraticCurveTo(-14, -h * 0.3, -10, -h * 0.1);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(8, -h * 0.5);
      ctx.quadraticCurveTo(14, -h * 0.3, 10, -h * 0.1);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(-6, -h * 0.52);
      ctx.quadraticCurveTo(-16, -h * 0.25, -12, 0);
      ctx.stroke();
    }

    // Type-specific details and weapon
    if (ct.weapon === 'katana') {
      // Ninja mask
      ctx.fillStyle = ct.bodyColor;
      ctx.fillRect(-10, -h * 0.48, 20, 6);
      ctx.fillStyle = '#fff';
      ctx.fillRect(-6, -h * 0.47, 4, 2);
      ctx.fillRect(2, -h * 0.47, 4, 2);
      // Katana swing
      const swing = Math.sin(t * 0.008 + c.attackPhase) * 1.2;
      ctx.save();
      ctx.translate(14, -h * 0.2);
      ctx.rotate(swing - 0.5);
      ctx.fillStyle = '#c0c0c0';
      ctx.fillRect(-1, -40, 3, 40);
      ctx.fillStyle = '#d4af37';
      ctx.fillRect(-3, -2, 7, 4);
      ctx.fillStyle = '#333';
      ctx.fillRect(-2, 0, 5, 8);
      ctx.restore();
    } else if (ct.weapon === 'broadsword') {
      // Helmet
      ctx.fillStyle = '#708090';
      ctx.beginPath();
      ctx.arc(0, -h * 0.48, 12, Math.PI, 0);
      ctx.fill();
      ctx.fillStyle = '#333';
      ctx.fillRect(-8, -h * 0.46, 16, 3);
      if (ct.female) {
        // Valkyrie wings on helmet
        ctx.fillStyle = '#87CEEB';
        ctx.beginPath();
        ctx.moveTo(-10, -h * 0.55);
        ctx.lineTo(-20, -h * 0.7);
        ctx.lineTo(-8, -h * 0.5);
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(10, -h * 0.55);
        ctx.lineTo(20, -h * 0.7);
        ctx.lineTo(8, -h * 0.5);
        ctx.fill();
      }
      // Broadsword
      const swing = Math.sin(t * 0.004 + c.attackPhase) * 0.8;
      ctx.save();
      ctx.translate(16, -h * 0.15);
      ctx.rotate(swing);
      ctx.fillStyle = '#888';
      ctx.fillRect(-2, -45, 5, 45);
      ctx.fillStyle = '#d4af37';
      ctx.fillRect(-5, -3, 11, 6);
      ctx.fillStyle = '#5c3a1e';
      ctx.fillRect(-1, 0, 4, 10);
      ctx.restore();
      // Shield
      ctx.fillStyle = ct.trimColor;
      ctx.beginPath();
      ctx.moveTo(-18, -h * 0.3);
      ctx.lineTo(-25, -h * 0.15);
      ctx.lineTo(-18, 0);
      ctx.lineTo(-11, -h * 0.15);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = '#d4af37';
      ctx.lineWidth = 1;
      ctx.stroke();
    } else if (ct.weapon === 'bow') {
      // Hood
      ctx.fillStyle = ct.bodyColor;
      ctx.beginPath();
      ctx.moveTo(-8, -h * 0.55);
      ctx.lineTo(0, -h * 0.65);
      ctx.lineTo(8, -h * 0.55);
      ctx.lineTo(8, -h * 0.42);
      ctx.lineTo(-8, -h * 0.42);
      ctx.closePath();
      ctx.fill();
      // Bow
      const drawBack = Math.sin(t * 0.006 + c.attackPhase);
      ctx.save();
      ctx.translate(16, -h * 0.2);
      ctx.strokeStyle = ct.female ? '#d4af37' : '#8B4513';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(0, 0, 25, -Math.PI * 0.4, Math.PI * 0.4);
      ctx.stroke();
      ctx.strokeStyle = '#ccc';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(25 * Math.cos(-Math.PI * 0.4), 25 * Math.sin(-Math.PI * 0.4));
      ctx.lineTo(Math.max(-drawBack * 8, -12), 0);
      ctx.lineTo(25 * Math.cos(Math.PI * 0.4), 25 * Math.sin(Math.PI * 0.4));
      ctx.stroke();
      if (drawBack > 0) {
        ctx.fillStyle = '#8B4513';
        ctx.fillRect(-drawBack * 8, -1, 30 + drawBack * 8, 2);
        ctx.beginPath();
        ctx.moveTo(30 + drawBack * 2, -4);
        ctx.lineTo(35 + drawBack * 2, 0);
        ctx.lineTo(30 + drawBack * 2, 4);
        ctx.closePath();
        ctx.fillStyle = '#888';
        ctx.fill();
      }
      ctx.restore();
      ctx.fillStyle = '#5c3a1e';
      ctx.fillRect(-18, -h * 0.35, 6, 20);
    } else if (ct.weapon === 'dagger') {
      // Hood
      ctx.fillStyle = ct.bodyColor;
      ctx.beginPath();
      ctx.moveTo(-10, -h * 0.55);
      ctx.lineTo(0, -h * 0.65);
      ctx.lineTo(10, -h * 0.55);
      ctx.lineTo(10, -h * 0.38);
      ctx.lineTo(-10, -h * 0.38);
      ctx.closePath();
      ctx.fill();
      // Shadow face
      ctx.fillStyle = '#1a0a1e';
      ctx.fillRect(-6, -h * 0.48, 12, 8);
      ctx.fillStyle = ct.trimColor;
      ctx.fillRect(-4, -h * 0.46, 3, 2);
      ctx.fillRect(1, -h * 0.46, 3, 2);
      // Dagger jab
      const jabPhase = Math.sin(t * 0.01 + c.attackPhase);
      const jabExt = jabPhase > 0.5 ? (jabPhase - 0.5) * 20 : 0;
      ctx.save();
      ctx.translate(14 + jabExt, -h * 0.15);
      ctx.fillStyle = '#c0c0c0';
      ctx.beginPath();
      ctx.moveTo(0, -2);
      ctx.lineTo(18, 0);
      ctx.lineTo(0, 2);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#333';
      ctx.fillRect(-6, -3, 6, 6);
      ctx.fillStyle = ct.trimColor;
      ctx.fillRect(-6, -1, 6, 2);
      ctx.restore();
    }

    // Injury visuals — bandage on arm, eye patch
    if (c.injured) {
      // Arm cast/bandage (white wrapping on weapon arm)
      ctx.fillStyle = '#f0f0f0';
      ctx.fillRect(10, -h * 0.28, 10, 14);
      ctx.strokeStyle = '#ccc';
      ctx.lineWidth = 1;
      for (let s = 0; s < 3; s++) {
        ctx.beginPath();
        ctx.moveTo(10, -h * 0.28 + s * 5);
        ctx.lineTo(20, -h * 0.28 + s * 5 + 2);
        ctx.stroke();
      }
      // Eye patch
      ctx.fillStyle = '#222';
      ctx.beginPath();
      ctx.arc(4, -h * 0.46, 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#222';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(4, -h * 0.46);
      ctx.lineTo(-8, -h * 0.52);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(4, -h * 0.46);
      ctx.lineTo(10, -h * 0.52);
      ctx.stroke();
      // Slight limp: tilt body a tiny bit
      ctx.rotate(0.06);
    }

    // Name label above head
    ctx.scale(c.facing, 1);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 11px sans-serif';
    ctx.textAlign = 'center';
    ctx.shadowColor = 'rgba(0,0,0,0.8)';
    ctx.shadowBlur = 3;
    ctx.fillText(c.name, 0, -h * 0.6 - (ct.female ? 8 : 0));
    ctx.shadowBlur = 0;

    ctx.restore();
  }

  function drawSky(t) {
    // Stars
    stars.forEach(s => {
      const twinkle = 0.3 + 0.7 * ((Math.sin(t * 0.001 * s.twinkleSpeed + s.phase) + 1) / 2);
      ctx.globalAlpha = twinkle;
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;

    // Moon arc across sky
    const b = battleState;
    const elapsed = (t - (b.introStart || t)) / 1000;
    const moonProgress = Math.min(elapsed / 60, 1); // full arc over 60s
    const moonX = W * 0.1 + moonProgress * W * 0.8;
    const moonY = groundY * 0.15 + Math.sin(moonProgress * Math.PI) * (-groundY * 0.1);
    ctx.fillStyle = '#f5f0c8';
    ctx.beginPath();
    ctx.arc(moonX, moonY, 25, 0, Math.PI * 2);
    ctx.fill();
    // Moon shadow (crescent)
    ctx.fillStyle = '#0a0515';
    ctx.beginPath();
    ctx.arc(moonX + 8, moonY - 4, 22, 0, Math.PI * 2);
    ctx.fill();
    // Moonlight glow
    ctx.beginPath();
    ctx.arc(moonX, moonY, 40, 0, Math.PI * 2);
    const moonGlow = ctx.createRadialGradient(moonX, moonY, 20, moonX, moonY, 40);
    moonGlow.addColorStop(0, 'rgba(245,240,200,0.15)');
    moonGlow.addColorStop(1, 'rgba(245,240,200,0)');
    ctx.fillStyle = moonGlow;
    ctx.fill();

    // Shooting stars
    if (t - battleState.lastShootingStar > 5000 + Math.random() * 3000 && shootingStars.length < 2) {
      shootingStars.push({
        x: Math.random() * W * 0.8,
        y: Math.random() * groundY * 0.3,
        vx: 4 + Math.random() * 3,
        vy: 2 + Math.random() * 2,
        life: 1,
        length: 30 + Math.random() * 20
      });
      battleState.lastShootingStar = t;
    }
    for (let i = shootingStars.length - 1; i >= 0; i--) {
      const ss = shootingStars[i];
      ss.x += ss.vx;
      ss.y += ss.vy;
      ss.life -= 0.015;
      if (ss.life <= 0) { shootingStars.splice(i, 1); continue; }
      ctx.globalAlpha = ss.life;
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(ss.x, ss.y);
      ctx.lineTo(ss.x - ss.vx * ss.length / 5, ss.y - ss.vy * ss.length / 5);
      ctx.stroke();
      // Fading tail
      const tailGrad = ctx.createLinearGradient(ss.x, ss.y, ss.x - ss.vx * ss.length / 3, ss.y - ss.vy * ss.length / 3);
      tailGrad.addColorStop(0, `rgba(255,255,255,${ss.life * 0.5})`);
      tailGrad.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.strokeStyle = tailGrad;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(ss.x - ss.vx * ss.length / 5, ss.y - ss.vy * ss.length / 5);
      ctx.lineTo(ss.x - ss.vx * ss.length / 3, ss.y - ss.vy * ss.length / 3);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }

  function frame(t) {
    const b = battleState;
    if (!b) return;
    try { _frameInner(t, b); } catch(e) { console.error('Battle frame error:', e); }
    b.raf = requestAnimationFrame(frame);
  }
  function _frameInner(t, b) {
    ctx.clearRect(0, 0, W, H);

    // Dark arena background
    const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
    bgGrad.addColorStop(0, '#0a0515');
    bgGrad.addColorStop(0.5, '#1a0a2e');
    bgGrad.addColorStop(1, '#2d1b3e');
    ctx.fillStyle = bgGrad;
    ctx.fillRect(0, 0, W, H);

    // Draw sky (stars, moon, shooting stars)
    drawSky(t);

    // Stone ground
    ctx.fillStyle = '#2a1a0a';
    ctx.fillRect(0, groundY + 22, W, H - groundY - 22);
    ctx.strokeStyle = '#4a3020';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, groundY + 22);
    ctx.lineTo(W, groundY + 22);
    ctx.stroke();

    // Torch flames
    for (let i = 0; i < 4; i++) {
      const tx = W * (0.1 + i * 0.27);
      const ty = groundY - 30;
      ctx.fillStyle = '#5c3a1e';
      ctx.fillRect(tx - 3, ty, 6, 52);
      const flicker = Math.sin(t * 0.01 + i * 2) * 3;
      ctx.beginPath();
      ctx.moveTo(tx - 8, ty);
      ctx.quadraticCurveTo(tx + flicker, ty - 25, tx + 8, ty);
      ctx.fillStyle = '#ff6600';
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(tx - 4, ty - 2);
      ctx.quadraticCurveTo(tx + flicker * 0.5, ty - 18, tx + 4, ty - 2);
      ctx.fillStyle = '#ffcc00';
      ctx.fill();
    }

    // Intro phase — reveal each character one at a time
    if (b.phase === 'intro') {
      const introElapsed = (t - b.introStart) / 1000;
      const perPlayer = 1.5;
      const currentReveal = Math.floor(introElapsed / perPlayer);
      const revealProgress = (introElapsed % perPlayer) / perPlayer;

      // Draw already-revealed characters at their positions
      for (let i = 0; i <= Math.min(currentReveal, b.chars.length - 1); i++) {
        const c = b.chars[i];
        c.x = c.targetX;
        drawCharacter(c, t);
      }

      // Show intro card for current character
      if (currentReveal >= 0 && currentReveal < b.chars.length && b.chars[currentReveal]) {
        const c = b.chars[currentReveal];
        const cardW = 260, cardH = 80;
        const cardX = W / 2 - cardW / 2;
        const slideIn = Math.min(revealProgress * 4, 1);
        const cardY = H * 0.15 + (1 - slideIn) * 50;
        ctx.globalAlpha = slideIn;
        // Card background
        ctx.fillStyle = 'rgba(0,0,0,0.8)';
        ctx.strokeStyle = c.type.trimColor;
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(cardX + 10, cardY);
        ctx.lineTo(cardX + cardW - 10, cardY);
        ctx.arcTo(cardX + cardW, cardY, cardX + cardW, cardY + 10, 10);
        ctx.lineTo(cardX + cardW, cardY + cardH - 10);
        ctx.arcTo(cardX + cardW, cardY + cardH, cardX + cardW - 10, cardY + cardH, 10);
        ctx.lineTo(cardX + 10, cardY + cardH);
        ctx.arcTo(cardX, cardY + cardH, cardX, cardY + cardH - 10, 10);
        ctx.lineTo(cardX, cardY + 10);
        ctx.arcTo(cardX, cardY, cardX + 10, cardY, 10);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
        // Trim accent bar
        ctx.fillStyle = c.type.trimColor;
        ctx.fillRect(cardX + 10, cardY + cardH - 8, cardW - 20, 4);
        // Player name
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 22px Georgia';
        ctx.textAlign = 'center';
        ctx.fillText(c.name, W / 2, cardY + 32);
        // Character type
        ctx.fillStyle = c.type.trimColor;
        ctx.font = '16px Georgia';
        ctx.fillText(c.type.name, W / 2, cardY + 58);
        ctx.globalAlpha = 1;
      }

      // Transition to countdown after all revealed
      if (introElapsed >= b.chars.length * perPlayer + 0.5) {
        b.phase = 'countdown';
        b.countdownStart = t;
      }
    }

    // Countdown phase
    if (b.phase === 'countdown') {
      const elapsed = (t - b.countdownStart) / 1000;
      const count = 3 - Math.floor(elapsed);

      b.chars.forEach(c => {
        const dx = c.targetX - c.x;
        c.x += dx * 0.03;
      });

      if (count > 0) {
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 120px Georgia';
        ctx.textAlign = 'center';
        ctx.shadowColor = '#e94560';
        ctx.shadowBlur = 30;
        ctx.fillText(count, W / 2, H / 2);
        ctx.shadowBlur = 0;
      } else if (elapsed < 4.5) {
        ctx.fillStyle = '#e94560';
        ctx.font = 'bold 80px Georgia';
        ctx.textAlign = 'center';
        ctx.shadowColor = '#e94560';
        ctx.shadowBlur = 30;
        ctx.fillText('FIGHT!', W / 2, H / 2);
        ctx.shadowBlur = 0;
      }

      if (elapsed >= 4.5) {
        b.phase = 'fighting';
        b.fightStart = t;
        b.lastKillTime = t;
      }
    }

    // Fighting phase — per-type movement + jumping
    if (b.phase === 'fighting') {
      b.chars.forEach(c => {
        if (!c.alive) return;

        // Handle bounce-back from injury
        if (c.bouncingBack) {
          c.x += c.bounceVX;
          c.jumpY += c.jumpVY;
          c.jumpVY -= 0.35;
          c.x = Math.max(30, Math.min(W - 30, c.x));
          if (c.jumpY <= 0) {
            c.jumpY = 0;
            c.jumpVY = 0;
            c.bouncingBack = false;
            c.bounceVX = 0;
            c.waypoint = 50 + Math.random() * (W - 100);
          }
          return; // skip normal movement while bouncing
        }

        const ct = c.type;

        // Find nearest enemy
        let nearestEnemy = null, nearestDist = Infinity;
        b.chars.forEach(other => {
          if (other === c || !other.alive) return;
          const d = Math.abs(other.x - c.x);
          if (d < nearestDist) { nearestDist = d; nearestEnemy = other; }
        });

        // Roaming waypoint — characters wander across the full width
        if (!c.waypoint || Math.abs(c.x - c.waypoint) < 20) {
          c.waypoint = 50 + Math.random() * (W - 100);
        }

        // Per-type movement speeds toward waypoint
        let speed = 0;
        if (ct.weapon === 'katana') {
          speed = 2.5; // ninja: fast
          // Occasional dash burst
          if (Math.sin(t * 0.003 + c.attackPhase) > 0.85) speed = 5;
        } else if (ct.weapon === 'broadsword') {
          speed = 1.2; // swordsman: slow and steady
        } else if (ct.weapon === 'bow') {
          speed = 1.8; // archer: moderate
        } else if (ct.weapon === 'dagger') {
          // Assassin: still then quick dart
          const dartPhase = Math.sin(t * 0.004 + c.attackPhase);
          speed = dartPhase > 0.6 ? 4 : 0.3;
        }

        const dx = c.waypoint - c.x;
        c.x += Math.sign(dx) * Math.min(speed, Math.abs(dx));
        c.x = Math.max(30, Math.min(W - 30, c.x));

        // Face direction of movement
        if (Math.abs(dx) > 5) c.facing = dx > 0 ? 1 : -1;

        // Jumping
        if (!c.isJumping && t > c.nextJumpTime) {
          c.isJumping = true;
          c.jumpVY = 6 + Math.random() * 4;
          c.nextJumpTime = t + 1000 + Math.random() * 2000;
        }
        if (c.isJumping) {
          c.jumpY += c.jumpVY;
          c.jumpVY -= 0.3; // gravity
          if (c.jumpY <= 0) {
            c.jumpY = 0;
            c.jumpVY = 0;
            c.isJumping = false;
          }
        }
      });

      // Collision-based kills: when two characters touch, one loses a life
      const aliveChars = b.chars.filter(c => c.alive && !c.bouncingBack);
      const collisionDist = 30;
      for (let i = 0; i < aliveChars.length; i++) {
        for (let j = i + 1; j < aliveChars.length; j++) {
          const a = aliveChars[i], bChar = aliveChars[j];
          if (Math.abs(a.x - bChar.x) < collisionDist && Math.abs(a.jumpY - bChar.jumpY) < 30) {
            const victim = Math.random() < 0.5 ? a : bChar;
            if (victim.alive && !victim.bouncingBack) {
              victim.lives--;
              const el = document.getElementById('bl_' + victim.name.replace(/\s/g, '_'));
              if (victim.lives <= 0) {
                // Second hit — real death
                victim.alive = false;
                victim.deathTime = t;
                sfx('hit');
                if (el) el.textContent = '💀';
                const row = document.getElementById('bi_' + victim.name.replace(/\s/g, '_'));
                if (row) { row.style.textDecoration = 'line-through'; row.style.opacity = '0.4'; }
              } else {
                // First hit — injured, bounce away
                victim.injured = true;
                victim.injuredTime = t;
                victim.bouncingBack = true;
                // Bounce high and away from attacker
                const attacker = victim === a ? bChar : a;
                const awayDir = victim.x > attacker.x ? 1 : -1;
                victim.bounceVX = awayDir * (4 + Math.random() * 3);
                victim.jumpVY = 12 + Math.random() * 4;
                victim.isJumping = true;
                sfx('pain');
                if (el) el.textContent = '♥🖤';
              }
            }
          }
        }
      }

      const remaining = b.chars.filter(c => c.alive);
      if (remaining.length <= playersPicked) {
        b.phase = 'done';
        b.winners = remaining;
        b.doneTime = t;
      }
    }

    // Death animations
    b.chars.forEach(c => {
      if (!c.alive && c.deathTime) {
        const elapsed = (t - c.deathTime) / 1000;
        if (elapsed < 0.8) {
          c.rotation = (elapsed / 0.8) * Math.PI / 2;
        } else {
          c.rotation = Math.PI / 2;
          c.opacity = Math.max(0, 1 - (elapsed - 0.8) / 0.5);
        }
      }
    });

    // Draw all characters (not during intro, handled separately)
    if (b.phase !== 'intro') {
      b.chars.forEach(c => drawCharacter(c, t));
    }

    // Done phase
    if (b.phase === 'done') {
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 36px Georgia';
      ctx.textAlign = 'center';
      ctx.shadowColor = '#e94560';
      ctx.shadowBlur = 20;
      const winNames = b.winners.map(w => w.name);
      ctx.fillText(winNames.join(', ') + (winNames.length > 1 ? ' are victorious!' : ' is victorious!'), W / 2, H * 0.25);
      ctx.shadowBlur = 0;

      if (t - b.doneTime > 3000) {
        captureCanvasMoment('battleCanvas', winNames.join(', '));
        resetGame();
        showWinner(winNames.length === 1 ? winNames[0] : winNames);
        return;
      }
    }
  }

  battleState.raf = requestAnimationFrame(frame);
}

// ============ GAME 7: DICE ============
let diceState = null;
const MULTIPLIER_SIDES = [0.5, 1, 1, 2, 2, 3];
const MULTIPLIER_LABELS = ['×½', '×1', '×1', '×2', '×2', '×3'];

function initDice() {
  showScreen('diceScreen');
  const canvas = document.getElementById('diceCanvas');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;

  const dieSize = Math.min(W * 0.15, 100);
  diceState = {
    phase: 'ready', // ready, rolling, result, done
    raf: null,
    currentPlayer: 0,
    scores: players.map(() => null),
    rollPlayers: players.map((_, i) => i),
    tiebreaker: false,
    dice: [
      { value: 1, topValue: 3, rightValue: 2, x: W * 0.3, y: H * 0.45, vx: 0, vy: 0, rot: 0, vrot: 0, settled: false, isMultiplier: false, finalValue: 1, lastSwap: 0, swapInterval: 120 },
      { value: 1, topValue: 5, rightValue: 4, x: W * 0.5, y: H * 0.45, vx: 0, vy: 0, rot: 0, vrot: 0, settled: false, isMultiplier: false, finalValue: 1, lastSwap: 0, swapInterval: 140 },
      { value: 0, topValue: 1, rightValue: 2, x: W * 0.7, y: H * 0.45, vx: 0, vy: 0, rot: 0, vrot: 0, settled: false, isMultiplier: true, finalValue: 0, lastSwap: 0, swapInterval: 130 }
    ],
    dieSize,
    rollStart: 0,
    rollDuration: 3500,
    canvas, ctx, W, H
  };

  updateDiceScoreboard();
  document.getElementById('diceStatus').textContent = players[0] + ' — tap to throw!';

  addTapHandler(canvas, () => {
    if (!diceState) return;
    if (diceState.phase === 'ready') {
      diceState.phase = 'rolling';
      diceState.rollStart = performance.now();
      // Throw dice from bottom-center with random velocities
      const startX = W * 0.5;
      const startY = H * 0.85;
      const directions = [-1, 0, 1]; // left, center, right
      // Shuffle directions so dice cross paths unpredictably
      for (let j = directions.length - 1; j > 0; j--) { const k = Math.floor(Math.random() * (j+1)); [directions[j], directions[k]] = [directions[k], directions[j]]; }
      diceState.dice.forEach((d, i) => {
        d.x = startX + (i - 1) * 20;
        d.y = startY;
        // Each die gets a distinct direction with some randomness
        d.vx = directions[i] * (3 + Math.random() * 3) + (Math.random() - 0.5) * 2;
        d.vy = -(6 + Math.random() * 4);
        d.rot = 0;
        d.vrot = (Math.random() - 0.5) * 0.2;
        d.settled = false;
        d.lastSwap = 0;
        d.swapInterval = 200 + Math.random() * 80;
        d.finalValue = d.isMultiplier ? Math.floor(Math.random() * 6) : Math.floor(Math.random() * 6) + 1;
        // Random adjacent faces for 3D
        d.topValue = d.isMultiplier ? Math.floor(Math.random() * 6) : Math.floor(Math.random() * 6) + 1;
        d.rightValue = d.isMultiplier ? Math.floor(Math.random() * 6) : Math.floor(Math.random() * 6) + 1;
      });
    }
  });

  currentGameCleanup = cleanupDice;
  diceState.raf = requestAnimationFrame(diceLoop);
}

function cleanupDice() {
  if (diceState && diceState.raf) cancelAnimationFrame(diceState.raf);
  const canvas = document.getElementById('diceCanvas');
  if (canvas) removeTapHandler(canvas);
  diceState = null;
}

function updateDiceScoreboard() {
  const sb = document.getElementById('diceScoreboard');
  sb.innerHTML = '<h4 style="color:#d4af37;margin-bottom:6px">Scores</h4>' +
    players.map((p, i) => {
      const isCurrent = diceState && i === diceState.currentPlayer;
      const score = diceState ? diceState.scores[i] : null;
      return `<div style="display:flex;align-items:center;gap:6px;margin:3px 0;${isCurrent ? 'color:#f0d080;font-weight:bold' : 'color:#ccc'}">
        <div style="width:12px;height:12px;border-radius:50%;background:${COLORS[i]}"></div>
        ${p}: ${score !== null ? score : '—'}
      </div>`;
    }).join('');
}

function drawDie2D(ctx, cx, cy, size, value, isMultiplier) {
  const h = size;
  const r = h * 0.12;
  ctx.save();
  ctx.translate(cx, cy);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath();
  ctx.roundRect(-h/2 + 4, -h/2 + 4, h, h, r);
  ctx.fill();

  // Die face
  if (isMultiplier) {
    const grad = ctx.createLinearGradient(-h/2, -h/2, h/2, h/2);
    grad.addColorStop(0, '#d4af37');
    grad.addColorStop(0.5, '#f5d060');
    grad.addColorStop(1, '#b8922a');
    ctx.fillStyle = grad;
  } else {
    ctx.fillStyle = '#fff';
  }
  ctx.beginPath();
  ctx.roundRect(-h/2, -h/2, h, h, r);
  ctx.fill();
  ctx.strokeStyle = isMultiplier ? '#8a6d1b' : '#bbb';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Content
  if (isMultiplier) {
    ctx.fillStyle = '#3a2a00';
    ctx.font = `bold ${h * 0.38}px Georgia`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(MULTIPLIER_LABELS[value], 0, 0);
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = `${h * 0.15}px serif`;
    ctx.fillText('★', -h/2 + 14, -h/2 + 16);
    ctx.fillText('★', h/2 - 14, h/2 - 12);
  } else {
    drawPipsOnFace(ctx, 0, 0, h * 0.65, value, false);
  }

  ctx.restore();
}

function drawPipsOnFace(ctx, cx, cy, area, value, small) {
  const pipR = small ? area * 0.08 : area * 0.08;
  const off = area * 0.28;
  ctx.fillStyle = '#1a1a1a';
  const positions = {
    1: [[0,0]],
    2: [[-off,-off],[off,off]],
    3: [[-off,-off],[0,0],[off,off]],
    4: [[-off,-off],[off,-off],[-off,off],[off,off]],
    5: [[-off,-off],[off,-off],[0,0],[-off,off],[off,off]],
    6: [[-off,-off],[off,-off],[-off,0],[off,0],[-off,off],[off,off]]
  };
  (positions[value] || []).forEach(([dx, dy]) => {
    ctx.beginPath();
    ctx.arc(cx + dx, cy + dy, pipR, 0, Math.PI * 2);
    ctx.fill();
  });
}

// Opposite faces on a die always sum to 7
function oppositeFace(v) { return 7 - v; }

function diceLoop(t) {
  if (!diceState) return;
  const s = diceState;
  const { ctx, W, H, dieSize } = s;
  ctx.clearRect(0, 0, W, H);

  // Casino felt texture lines
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 1;
  for (let i = 0; i < W; i += 30) {
    ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, H); ctx.stroke();
  }

  // Gold border trim
  ctx.strokeStyle = 'rgba(212,175,55,0.3)';
  ctx.lineWidth = 4;
  ctx.strokeRect(20, 20, W - 40, H - 40);

  const margin = dieSize * 0.8;

  if (s.phase === 'rolling') {
    const elapsed = t - s.rollStart;
    const progress = Math.min(elapsed / s.rollDuration, 1);
    let allSettled = true;

    s.dice.forEach(d => {
      if (d.settled) return;
      // Physics: gravity + friction + bounce
      d.vy += 0.15;
      d.vx *= 0.985;
      d.vy *= 0.985;
      d.x += d.vx;
      d.y += d.vy;
      d.rot += d.vrot;
      d.vrot *= 0.97;

      // Bounce off walls
      if (d.x < margin) { d.x = margin; d.vx = Math.abs(d.vx) * 0.6; d.vrot *= -0.5; }
      if (d.x > W - margin) { d.x = W - margin; d.vx = -Math.abs(d.vx) * 0.6; d.vrot *= -0.5; }
      if (d.y < margin + 60) { d.y = margin + 60; d.vy = Math.abs(d.vy) * 0.5; }
      if (d.y > H - margin - 20) { d.y = H - margin - 20; d.vy = -Math.abs(d.vy) * 0.4; d.vrot *= 0.5; }

      // Face changes — slow, then slower as settling. interval based per-die
      const speed = Math.abs(d.vx) + Math.abs(d.vy) + Math.abs(d.vrot) * 10;
      const slowdown = Math.max(1, 5 - speed);
      const currentInterval = d.swapInterval * slowdown;
      if (elapsed - d.lastSwap > currentInterval && speed > 0.8) {
        d.lastSwap = elapsed;
        if (d.isMultiplier) {
          d.value = Math.floor(Math.random() * 6);
          d.topValue = Math.floor(Math.random() * 6);
          d.rightValue = Math.floor(Math.random() * 6);
        } else {
          d.value = Math.floor(Math.random() * 6) + 1;
          d.topValue = Math.floor(Math.random() * 6) + 1;
          d.rightValue = Math.floor(Math.random() * 6) + 1;
        }
      }

      // Check settled
      if (speed < 0.5 || progress > 0.92) {
        d.settled = true;
        d.value = d.finalValue;
        if (!d.isMultiplier) {
          d.topValue = oppositeFace(d.finalValue);
          d.rightValue = [2,3,5,1,6,4][d.finalValue - 1];
        } else {
          d.topValue = (d.finalValue + 3) % 6;
          d.rightValue = (d.finalValue + 1) % 6;
        }
        d.vx = 0; d.vy = 0; d.vrot = 0;
        d.rot = 0;
      } else {
        allSettled = false;
      }
    });

    // Draw 3D dice
    s.dice.forEach(d => {
      drawDie2D(ctx, d.x, d.y, dieSize, d.value, d.isMultiplier);
    });

    if (allSettled && elapsed > 800) {
      s.phase = 'result';
      const die1Val = s.dice[0].finalValue;
      const die2Val = s.dice[1].finalValue;
      const multIdx = s.dice[2].finalValue;
      const sum = die1Val + die2Val;
      const mult = MULTIPLIER_SIDES[multIdx];
      const score = Math.round(sum * mult * 10) / 10;
      const pi = s.rollPlayers[s.currentPlayer];
      s.scores[pi] = score;
      updateDiceScoreboard();

      const multLabel = MULTIPLIER_LABELS[multIdx];
      document.getElementById('diceStatus').innerHTML =
        `<span style="color:${COLORS[pi]}">${players[pi]}</span> rolled ${die1Val} + ${die2Val} ${multLabel} = <b>${score}</b>`;

      setTimeout(() => {
        if (!diceState) return;
        s.currentPlayer++;
        if (s.currentPlayer >= s.rollPlayers.length) {
          // Check for ties at top
          const activePlayers = s.rollPlayers;
          let maxScore = -1;
          activePlayers.forEach(pi => { if (s.scores[pi] > maxScore) maxScore = s.scores[pi]; });
          const tiedPlayers = activePlayers.filter(pi => s.scores[pi] === maxScore);

          if (tiedPlayers.length === 1) {
            // Winner!
            const winnerIdx = tiedPlayers[0];
            s.phase = 'done';
            document.getElementById('diceStatus').innerHTML =
              `<span style="color:${COLORS[winnerIdx]}">${players[winnerIdx]}</span> wins with ${maxScore}!`;
            captureCanvasMoment('diceCanvas', players[winnerIdx]);
            setTimeout(() => { resetGame(); showWinner(players[winnerIdx]); }, 2500);
          } else {
            // Tiebreaker round
            s.tiebreaker = true;
            s.rollPlayers = tiedPlayers;
            s.currentPlayer = 0;
            tiedPlayers.forEach(pi => { s.scores[pi] = null; });
            updateDiceScoreboard();
            document.getElementById('diceStatus').innerHTML =
              `<b>Tiebreaker!</b> ${tiedPlayers.map(pi => `<span style="color:${COLORS[pi]}">${players[pi]}</span>`).join(' vs ')}`;
            setTimeout(() => {
              if (!diceState) return;
              const pi = s.rollPlayers[0];
              document.getElementById('diceStatus').textContent = players[pi] + ' — tap to throw!';
              s.phase = 'ready';
            }, 2000);
          }
        } else {
          s.phase = 'ready';
          const nextPi = s.rollPlayers[s.currentPlayer];
          document.getElementById('diceStatus').textContent = players[nextPi] + ' — tap to throw!';
          updateDiceScoreboard();
        }
      }, 2000);
    }
  } else {
    // Static 3D dice display
    s.dice.forEach(d => {
      drawDie2D(ctx, d.x, d.y, dieSize, d.value, d.isMultiplier);
    });
  }

  // Labels under dice
  if (s.phase !== 'rolling') {
    s.dice.forEach((d, i) => {
      ctx.fillStyle = d.isMultiplier ? 'rgba(212,175,55,0.7)' : 'rgba(255,255,255,0.5)';
      ctx.font = '13px Georgia';
      ctx.textAlign = 'center';
      ctx.fillText(d.isMultiplier ? 'Multiplier' : 'Die ' + (i + 1), d.x, d.y + dieSize / 2 + 20);
    });
  }

  // Tap prompt
  if (s.phase === 'ready') {
    const pulse = 0.5 + Math.sin(t * 0.004) * 0.3;
    ctx.fillStyle = `rgba(240,208,128,${pulse})`;
    ctx.font = 'bold 20px Georgia';
    ctx.textAlign = 'center';
    ctx.fillText('Tap to throw!', W / 2, H * 0.88);
  }

  // Tiebreaker banner
  if (s.tiebreaker && s.phase !== 'done') {
    ctx.fillStyle = 'rgba(212,175,55,0.15)';
    ctx.fillRect(0, H * 0.08, W, 30);
    ctx.fillStyle = '#d4af37';
    ctx.font = 'bold 16px Georgia';
    ctx.textAlign = 'center';
    ctx.fillText('TIEBREAKER ROUND', W / 2, H * 0.08 + 20);
  }

  s.raf = requestAnimationFrame(diceLoop);
}

// ============ GAME 8: NAME PICKER ============
let namePickerState = null;

function initNamePicker() {
  showScreen('namePickerScreen');
  const canvas = document.getElementById('namePickerCanvas');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;

  // Pre-generate floating particles for calm background
  const particles = [];
  for (let i = 0; i < 30; i++) {
    particles.push({
      x: Math.random() * W, y: Math.random() * H,
      size: 1 + Math.random() * 2,
      speed: 0.2 + Math.random() * 0.3,
      alpha: 0.2 + Math.random() * 0.3,
      phase: Math.random() * Math.PI * 2
    });
  }

  namePickerState = {
    phase: 'placing', // placing, flashing, done
    raf: null,
    canvas, ctx, W, H,
    placedNames: [], // { name, x, y }
    currentPlaceIdx: 0,
    particles,
    flashIdx: 0,
    flashStart: 0,
    flashDuration: 10000, // 10 seconds total
    lastFlashSwap: 0,
    winnerIdx: -1
  };

  document.getElementById('namePickerStatus').textContent = players[0] + ' — tap anywhere!';

  addTapHandler(canvas, (e) => {
    if (!namePickerState || namePickerState.phase !== 'placing') return;
    const rect = canvas.getBoundingClientRect();
    const clientX = e.clientX !== undefined ? e.clientX : (e.touches ? e.touches[0].clientX : 0);
    const clientY = e.clientY !== undefined ? e.clientY : (e.touches ? e.touches[0].clientY : 0);
    const x = (clientX - rect.left) * (canvas.width / rect.width);
    const y = (clientY - rect.top) * (canvas.height / rect.height);
    // Clamp to safe area
    const cx = Math.max(60, Math.min(W - 60, x));
    const cy = Math.max(80, Math.min(H - 40, y));

    namePickerState.placedNames.push({
      name: players[namePickerState.currentPlaceIdx],
      x: cx, y: cy,
      color: COLORS[namePickerState.currentPlaceIdx]
    });
    namePickerState.currentPlaceIdx++;

    if (namePickerState.currentPlaceIdx >= players.length) {
      // All placed, start flashing
      namePickerState.phase = 'flashing';
      namePickerState.flashStart = performance.now();
      namePickerState.flashIdx = 0;
      namePickerState.lastFlashSwap = 0;
      // Pre-determine winner
      namePickerState.winnerIdx = Math.floor(Math.random() * players.length);
      document.getElementById('namePickerStatus').textContent = '';
    } else {
      document.getElementById('namePickerStatus').textContent =
        players[namePickerState.currentPlaceIdx] + ' — tap anywhere!';
    }
  });

  currentGameCleanup = cleanupNamePicker;
  namePickerState.raf = requestAnimationFrame(namePickerLoop);
}

function cleanupNamePicker() {
  if (namePickerState && namePickerState.raf) cancelAnimationFrame(namePickerState.raf);
  const canvas = document.getElementById('namePickerCanvas');
  if (canvas) removeTapHandler(canvas);
  namePickerState = null;
}

function namePickerLoop(t) {
  if (!namePickerState) return;
  const s = namePickerState;
  const { ctx, W, H } = s;

  // Draw calm background
  const bgGrad = ctx.createLinearGradient(0, 0, W, H);
  bgGrad.addColorStop(0, '#1a1a3e');
  bgGrad.addColorStop(0.3, '#2d1b4e');
  bgGrad.addColorStop(0.6, '#1a3a4e');
  bgGrad.addColorStop(1, '#1a2a3e');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);

  // Floating particles
  s.particles.forEach(p => {
    p.y -= p.speed;
    if (p.y < -10) { p.y = H + 10; p.x = Math.random() * W; }
    const twinkle = 0.5 + Math.sin(t * 0.002 + p.phase) * 0.5;
    ctx.globalAlpha = p.alpha * twinkle;
    ctx.fillStyle = '#c8b8e8';
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  // Draw placed names
  if (s.phase === 'placing') {
    s.placedNames.forEach(pn => {
      ctx.fillStyle = pn.color;
      ctx.font = 'bold 26px Georgia';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.shadowColor = pn.color;
      ctx.shadowBlur = 8;
      ctx.fillText(pn.name, pn.x, pn.y);
      ctx.shadowBlur = 0;
    });
  }

  if (s.phase === 'flashing') {
    const elapsed = t - s.flashStart;
    const progress = Math.min(elapsed / s.flashDuration, 1);

    // Interval starts fast (80ms) and slows to ~800ms
    const interval = 80 + progress * progress * progress * 720;

    if (elapsed - s.lastFlashSwap > interval) {
      s.lastFlashSwap = elapsed;
      if (progress < 0.95) {
        // Random next, but avoid same
        let next;
        do { next = Math.floor(Math.random() * s.placedNames.length); } while (next === s.flashIdx && s.placedNames.length > 1);
        s.flashIdx = next;
      } else {
        // Lock to winner in final moments
        s.flashIdx = s.winnerIdx;
      }
    }
