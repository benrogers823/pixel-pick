<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Pixel Pick</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
html { overflow: hidden; width: 100%; height: 100%; }
body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0a0a1a; color: #fff; overflow: hidden; width: 100%; height: 100vh; height: 100dvh; -webkit-text-size-adjust: 100%; }
canvas { touch-action: none; }
.screen { display: none; width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
.screen.active { display: flex; }

/* Setup Screen — 80s Retro Arcade */
#setupScreen { flex-direction: column; align-items: center; justify-content: flex-start; background: #0a0a1a; overflow-y: auto; padding: 20px 0; position: relative; }
#setupBg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden; z-index: 0; }
/* Retro perspective grid floor */
#setupScreen .retro-grid { position: absolute; bottom: 0; left: 0; width: 100%; height: 55%; background: linear-gradient(180deg, transparent 0%, rgba(255,0,100,0.06) 30%, rgba(255,0,255,0.12) 100%); background-size: 100% 100%; overflow: hidden; pointer-events: none; z-index: 0; }
#setupScreen .retro-grid::before { content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(90deg, rgba(255,0,255,0.15) 0px, transparent 1px, transparent 60px), repeating-linear-gradient(0deg, rgba(0,255,255,0.1) 0px, transparent 1px, transparent 40px); transform: perspective(400px) rotateX(60deg); transform-origin: bottom center; }
/* Scanline overlay */
#setupScreen .scanlines { position: absolute; inset: 0; background: repeating-linear-gradient(0deg, transparent 0px, transparent 2px, rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 4px); pointer-events: none; z-index: 5; }
/* Stars / pixel dots */
#setupScreen .pixel-stars { position: absolute; inset: 0; pointer-events: none; z-index: 0; }
.floating-emoji { position: absolute; font-size: 2.2em; opacity: 0.25; animation: floatUp linear infinite; pointer-events: none; filter: saturate(1.5); }
@keyframes floatUp { 0% { transform: translateY(100vh) rotate(0deg) scale(0.8); opacity: 0; } 10% { opacity: 0.3; } 50% { opacity: 0.35; } 90% { opacity: 0.2; } 100% { transform: translateY(-80px) rotate(360deg) scale(1.1); opacity: 0; } }
/* Neon sweep lines */
.sweep-line { position: absolute; height: 2px; background: linear-gradient(90deg, transparent, #ff00ff, #00ffff, transparent); pointer-events: none; animation: sweepAcross linear infinite; box-shadow: 0 0 8px #ff00ff, 0 0 16px rgba(0,255,255,0.3); }
@keyframes sweepAcross { 0% { transform: translateX(-120%); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateX(120%); opacity: 0; } }
.sweep-line-v { position: absolute; width: 2px; background: linear-gradient(180deg, transparent, #00ffff, #ff00ff, transparent); pointer-events: none; animation: sweepDown linear infinite; box-shadow: 0 0 8px #00ffff, 0 0 16px rgba(255,0,255,0.3); }
@keyframes sweepDown { 0% { transform: translateY(-120%); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateY(120%); opacity: 0; } }
/* Neon ambient glows */
#setupScreen::before { content: ''; position: absolute; top: 5%; left: 50%; transform: translateX(-50%); width: 700px; height: 400px; background: radial-gradient(ellipse, rgba(255,0,255,0.12) 0%, rgba(0,255,255,0.06) 40%, transparent 70%); pointer-events: none; z-index: 0; }
#setupScreen::after { content: ''; position: absolute; bottom: 10%; right: 20%; width: 500px; height: 300px; background: radial-gradient(ellipse, rgba(0,255,255,0.1) 0%, rgba(255,0,100,0.05) 40%, transparent 65%); pointer-events: none; z-index: 0; }
#setupScreen > *:not(#setupBg):not(.sweep-line):not(.sweep-line-v):not(.retro-grid):not(.scanlines):not(.pixel-stars) { position: relative; z-index: 2; }
#setupScreen h1 { font-size: 2.4em; margin-bottom: 8px; margin-top: 20px; position: relative; flex-shrink: 0; }
.title-wrap { display: flex; align-items: center; gap: 14px; position: relative; }
.title-text { font-family: 'Press Start 2P', monospace; background: linear-gradient(180deg, #ff00ff 0%, #ff66aa 30%, #ffff00 50%, #00ffff 70%, #ff00ff 100%); background-size: 100% 400%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: neonScroll 3s linear infinite; filter: drop-shadow(0 0 20px rgba(255,0,255,0.8)) drop-shadow(0 0 40px rgba(0,255,255,0.5)) drop-shadow(0 0 60px rgba(255,255,0,0.3)); letter-spacing: 6px; font-size: 0.75em; }
@keyframes neonScroll { 0% { background-position: 0% 0%; } 100% { background-position: 0% 100%; } }
@keyframes titleGradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
.title-sub { font-size: 0.38em; color: #00ffff; letter-spacing: 8px; text-transform: uppercase; font-weight: 400; -webkit-text-fill-color: unset; background: none; display: block; text-align: center; margin-top: 6px; font-family: 'Press Start 2P', monospace; font-style: normal; text-shadow: 0 0 10px #00ffff, 0 0 20px rgba(0,255,255,0.5), 0 0 40px rgba(0,255,255,0.2); animation: subtitleFlicker 4s ease-in-out infinite; }
@keyframes subtitleFlicker { 0%,100% { opacity: 1; } 48% { opacity: 1; } 50% { opacity: 0.6; } 52% { opacity: 1; } 80% { opacity: 1; } 82% { opacity: 0.7; } 84% { opacity: 1; } }
.title-sparkle { position: absolute; width: 4px; height: 4px; background: #ff00ff; border-radius: 0; opacity: 0; animation: sparkle 1.5s ease-in-out infinite; box-shadow: 0 0 10px #ff00ff, 0 0 20px #00ffff; }
@keyframes sparkle { 0%,100% { opacity: 0; transform: scale(0); } 50% { opacity: 1; transform: scale(2.5); } }
/* Decorative pixel rules */
.title-rule { display: flex; align-items: center; gap: 12px; width: 420px; margin-top: -2px; margin-bottom: 16px; flex-shrink: 0; }
.title-rule-line { flex: 1; height: 2px; background: linear-gradient(90deg, transparent, #ff00ff, #00ffff, transparent); box-shadow: 0 0 6px rgba(255,0,255,0.5); }
.title-rule-diamond { width: 8px; height: 8px; background: #ffff00; transform: rotate(45deg); flex-shrink: 0; box-shadow: 0 0 8px #ffff00, 0 0 16px rgba(255,255,0,0.4); }
/* Player range switch */
.range-switch-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2px; }
.range-switch { display: flex; border: 1px solid rgba(0,255,255,0.3); border-radius: 3px; overflow: hidden; cursor: pointer; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
.range-opt { padding: 3px 8px; font-size: 0.55em; color: rgba(0,255,255,0.5); font-family: 'Press Start 2P', monospace; transition: all 0.2s; user-select: none; }
.range-opt.active { background: rgba(0,255,255,0.2); color: #0ff; box-shadow: 0 0 8px rgba(0,255,255,0.3); }
/* Setup box — CRT monitor style */
.setup-box { background: rgba(10,10,40,0.85); border-radius: 4px; padding: 28px 36px; max-width: 800px; width: 92%; border: 2px solid rgba(0,255,255,0.3); backdrop-filter: blur(8px); box-shadow: 0 0 20px rgba(0,255,255,0.15), 0 0 40px rgba(255,0,255,0.08), inset 0 0 30px rgba(0,0,0,0.5); }
.setup-box label { display: block; margin-bottom: 8px; font-size: 0.85em; color: #00ffcc; font-family: 'Press Start 2P', monospace; }
.setup-box input, .setup-box select { width: 100%; padding: 8px 12px; border-radius: 2px; border: 1px solid rgba(0,255,255,0.25); background: rgba(0,20,40,0.6); color: #0f0; font-size: 0.95em; margin-bottom: 6px; transition: border-color 0.2s, box-shadow 0.2s; font-family: 'Segoe UI', sans-serif; }
.setup-box input:focus { outline: none; border-color: #ff00ff; box-shadow: 0 0 12px rgba(255,0,255,0.4); }
.setup-box input::placeholder { color: rgba(0,255,200,0.3); }
#playerNamesDiv { max-height: 340px; overflow-y: auto; }
.btn { padding: 12px 32px; border-radius: 4px; border: none; font-size: 1.1em; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; font-family: 'Press Start 2P', monospace; }
.btn:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(0,0,0,0.4); }
.btn-primary { background: linear-gradient(180deg, #ff00ff, #cc00cc); color: #fff; box-shadow: 0 0 15px rgba(255,0,255,0.5), 0 0 30px rgba(255,0,255,0.2); font-weight: 600; letter-spacing: 1px; border: 2px solid #ff66ff; }
.btn-primary:hover { box-shadow: 0 0 25px rgba(255,0,255,0.7), 0 0 50px rgba(255,0,255,0.3); border-color: #ffaaff; }
.btn-secondary { background: rgba(0,255,255,0.08); color: #00ffcc; border: 1px solid rgba(0,255,255,0.25); font-family: 'Press Start 2P', monospace; font-size: 0.7em; }
@keyframes btnSheen { 0% { transform: translateX(-100%) rotate(25deg); } 100% { transform: translateX(100%) rotate(25deg); } }
@keyframes pixelBlink { 0%,100% { opacity: 0.2; } 50% { opacity: 0.9; } }

/* Menu Screen */
#menuScreen { flex-direction: column; align-items: center; justify-content: center; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); gap: 12px; overflow-y: auto; padding: 20px 0; }
#menuScreen h2 { font-size: 2em; margin-bottom: 4px; }
.game-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; max-width: 700px; width: 92%; }
.game-card { background: rgba(255,255,255,0.08); border-radius: 14px; padding: 18px 14px; text-align: center; cursor: pointer; transition: transform 0.2s, background 0.2s; border: 2px solid transparent; }
.game-card:hover { transform: translateY(-4px); background: rgba(255,255,255,0.14); border-color: #e94560; }
.game-card .icon { font-size: 2.5em; margin-bottom: 6px; }
.game-card h3 { font-size: 1.1em; margin-bottom: 4px; }
.game-card p { font-size: 0.8em; color: #aaa; }

/* 3x3 Slot Machine */
.slot-machine-3x3 { background: linear-gradient(180deg, #1a0a2e 0%, #0d0d1a 100%); border: 3px solid #d4af37; border-radius: 8px; padding: 0; position: relative; box-shadow: 0 0 20px rgba(212,175,55,0.25), inset 0 0 30px rgba(0,0,0,0.5); overflow: hidden; margin-top: 8px; }
.slot-3x3-header { text-align: center; font-family: 'Press Start 2P', monospace; font-size: 0.55em; color: #d4af37; padding: 10px 8px 6px; letter-spacing: 2px; text-shadow: 0 0 10px rgba(212,175,55,0.5); }
.slot-3x3-body { display: flex; align-items: stretch; gap: 0; }
.slot-3x3-grid { display: flex; flex: 1; gap: 0; }
.slot-col { flex: 1; height: 210px; overflow: hidden; border-right: 2px solid rgba(212,175,55,0.3); background: #0a0a15; position: relative; }
.slot-col:first-child { border-left: none; }
.slot-col:last-child { border-right: none; }
.slot-col-strip { display: flex; flex-direction: column; will-change: transform; }
.slot-col-strip.spinning { filter: blur(2px); }
.slot-game-entry { height: 70px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; flex-shrink: 0; cursor: pointer; transition: background 0.15s; border-bottom: 1px solid rgba(212,175,55,0.1); position: relative; }
.slot-game-entry .sge-icon { font-size: 1.6em; line-height: 1; }
.slot-game-entry .sge-name { font-family: 'Press Start 2P', monospace; font-size: 0.4em; color: #00ffcc; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; padding: 0 4px; }
.slot-game-entry.row-hover { background: rgba(212,175,55,0.15); }
.slot-game-entry.row-hover .sge-name { color: #ffcc00; }
.slot-game-entry.row-selected { background: rgba(255,0,255,0.3); animation: rowFlash 0.3s ease-out; }
@keyframes rowFlash { 0% { background: rgba(255,255,255,0.6); } 100% { background: rgba(255,0,255,0.3); } }
.slot-lever { width: 40px; position: relative; cursor: pointer; flex-shrink: 0; touch-action: manipulation; background: linear-gradient(180deg, #2a1a3e, #1a0a2e); border-left: 2px solid rgba(212,175,55,0.3); display: flex; align-items: center; justify-content: center; }
.lever-track { position: absolute; left: 50%; transform: translateX(-50%); width: 8px; height: 70%; background: linear-gradient(90deg, #888, #ccc, #888); border-radius: 4px; border: 1px solid #555; }
.lever-ball { position: absolute; left: 50%; transform: translateX(-50%); width: 26px; height: 26px; background: radial-gradient(circle at 35% 35%, #ff4444, #cc0000, #880000); border-radius: 50%; border: 2px solid #ffcc00; top: 15%; transition: top 0.3s cubic-bezier(0.6, -0.28, 0.74, 0.05); box-shadow: 0 2px 8px rgba(0,0,0,0.5), 0 0 10px rgba(255,0,0,0.3); }
.lever-ball.pulled { top: calc(85% - 26px); }
.slot-col.stopped { box-shadow: inset 0 0 15px rgba(255,204,0,0.2); transition: box-shadow 0.3s; }
.slot-row-hints { text-align: center; font-family: 'Press Start 2P', monospace; font-size: 0.35em; color: rgba(212,175,55,0.5); padding: 6px 8px 8px; letter-spacing: 1px; }
.slot-row-hints.ready { color: #d4af37; animation: hintPulse 1.5s ease-in-out infinite; }
@keyframes hintPulse { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }

/* Winner Screen */
#winnerScreen { flex-direction: column; align-items: center; justify-content: center; background: #1a1a2e; z-index: 100; overflow-y: auto; }
#winnerCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
#winnerContent { position: relative; z-index: 10; display: flex; align-items: center; gap: 30px; }
#winnerTextSide { text-align: center; }
#winnerName { font-size: 3.5em; font-weight: bold; text-align: center; text-shadow: 0 0 30px rgba(233,69,96,0.8), 0 0 60px rgba(233,69,96,0.4); }
#winnerSub { font-size: 1.3em; color: #ccc; margin-top: 10px; }
#winnerButtons { margin-top: 25px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
#winnerBack { position: relative; z-index: 10; }
/* Polaroid style */
#winnerMomentWrap { text-align: center; }
.polaroid { display: inline-block; background: #f5f0e8; padding: 10px 10px 40px 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.5), 0 0 40px rgba(0,0,0,0.2); transform: rotate(-3deg); transition: transform 0.3s; position: relative; }
.polaroid:hover { transform: rotate(0deg) scale(1.02); }
.polaroid-caption { position: absolute; bottom: 10px; left: 0; right: 0; text-align: center; font-family: 'Comic Sans MS', 'Segoe Print', cursive; font-size: 0.85em; color: #444; }
#winnerMomentImg { display: block; width: 250px; height: 160px; object-fit: cover; background: #222; }
#copyMomentBtn { position: relative; z-index: 10; margin-top: 10px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); color: #ddd; padding: 5px 14px; border-radius: 4px; font-family: 'Courier New', monospace; font-size: 0.75em; cursor: pointer; letter-spacing: 1px; transition: all 0.2s; }
#copyMomentBtn:hover { background: rgba(255,255,255,0.25); box-shadow: 0 0 10px rgba(255,255,255,0.2); }

/* Spinning Wheel - Casino theme */
#wheelScreen { flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(ellipse at center, #1a472a 0%, #0d2818 50%, #061a0e 100%); }
#wheelContainer { position: relative; }
#wheelCanvas { display: block; }
#spinBtn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 70px; height: 70px; border-radius: 50%; background: linear-gradient(135deg, #d4af37, #b8860b); color: #fff; border: 3px solid #fff; font-size: 0.9em; font-weight: bold; cursor: pointer; z-index: 5; transition: transform 0.15s; text-shadow: 0 1px 2px rgba(0,0,0,0.5); }
#spinBtn:hover { transform: translate(-50%, -50%) scale(1.1); }
#spinBtn:disabled { opacity: 0.5; cursor: default; transform: translate(-50%, -50%); }
#wheelPointer { position: absolute; right: -30px; top: 50%; transform: translateY(-50%); width: 0; height: 0; border-top: 20px solid transparent; border-bottom: 20px solid transparent; border-right: 35px solid #d4af37; filter: drop-shadow(-2px 0 4px rgba(0,0,0,0.5)); z-index: 5; }
.wheel-back { position: absolute; top: 15px; left: 15px; }

/* Ships - Castle theme */
#shipsScreen { flex-direction: column; align-items: center; background: linear-gradient(180deg, #0a0a1e 0%, #151530 25%, #555 26%, #4a4a4a 40%, #555 55%, #4a4a4a 70%, #555 85%, #3a3a3a 100%); position: relative; overflow: hidden; }
#shipsScreen::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 50px; z-index: 1; background: repeating-linear-gradient(90deg, #555 0px, #555 30px, transparent 30px, transparent 45px); }
#shipsScreen::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 26%; z-index: 0; background: linear-gradient(180deg, #0a0a1e 0%, #151530 100%); }
#shipsGrid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 15px; z-index: 2; max-width: 420px; width: 90%; }
.grid-cell { width: 100%; aspect-ratio: 1; background: rgba(0,0,0,0.3); border: 2px solid #8b6914; border-radius: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s; position: relative; font-size: 1.5em; overflow: hidden; }
.grid-cell.hit-empty { background: rgba(40,25,10,0.7); cursor: default; }
.grid-cell.hit-empty::after { content: '\2716'; color: rgba(200,150,50,0.5); font-size: 1.5em; }
.grid-cell:hover { background: rgba(255,200,50,0.15); }
.grid-cell.hit { animation: flashRed 0.5s; }
@keyframes flashRed { 0%,100% { background: rgba(0,0,0,0.3); } 50% { background: rgba(255,60,0,0.7); } }
.grid-cell.destroyed { background: rgba(100,0,0,0.4); }
#shipsStatus { font-size: 1.8em; margin-top: 10px; z-index: 2; text-align: center; min-height: 50px; color: #f0d080; font-family: Georgia, serif; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
#cannonArea { position: relative; z-index: 2; margin-top: auto; margin-bottom: 15px; height: 260px; width: 360px; margin-left: auto; margin-right: auto; }
#cannonSvg { width: 360px; height: 260px; position: absolute; bottom: 0; left: 0; filter: drop-shadow(0 0 18px rgba(255,165,0,0.8)); }
@keyframes cannonGlow { 0%,100% { filter: drop-shadow(0 0 18px rgba(255,165,0,0.8)) drop-shadow(0 0 6px rgba(255,100,0,0.4)); } 50% { filter: drop-shadow(0 0 30px rgba(255,200,50,1)) drop-shadow(0 0 12px rgba(255,100,0,0.6)); } }
#cannonSvg { animation: cannonGlow 1.5s ease-in-out infinite; }
#cannonWholeGroup { transform-origin: 100px 120px; }
#cannonWholeGroup:hover { filter: brightness(1.4); }
#cannonWholeGroup.cooldown { opacity: 0.5; cursor: default; filter: grayscale(0.4); }
#explosionCanvas { position: absolute; top: -100px; left: 0; width: 200px; height: 150px; pointer-events: none; z-index: 3; }
.ships-back { position: absolute; top: 15px; left: 15px; z-index: 10; }
.smoke { position: absolute; width: 8px; height: 8px; background: rgba(150,150,150,0.6); border-radius: 50%; animation: smokeRise 2s infinite; }
@keyframes smokeRise { 0% { transform: translateY(0) scale(1); opacity: 0.7; } 100% { transform: translateY(-30px) scale(2); opacity: 0; } }
/* Medieval torch flicker */
.torch { position: absolute; z-index: 1; }
.torch-flame { width: 12px; height: 20px; background: radial-gradient(ellipse, #ff6600, #ff3300, transparent); border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%; animation: flicker 0.3s infinite alternate; }
@keyframes flicker { 0% { transform: scaleY(1) scaleX(1); opacity: 0.9; } 100% { transform: scaleY(1.2) scaleX(0.8); opacity: 1; } }

/* Marble Race - Wooden Track */
#marbleScreen { flex-direction: column; align-items: center; background: #3d2b1f; overflow: hidden; }
#marbleCanvas { display: block; }
.marble-back { position: absolute; top: 15px; left: 15px; z-index: 10; }
#marbleScoreboard { position: absolute; top: 10px; right: 10px; background: rgba(30,15,5,0.45); padding: 10px 15px; border-radius: 10px; z-index: 10; font-size: 0.9em; min-width: 130px; border: 1px solid rgba(200,168,112,0.3); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); }
#marbleScoreboard h4 { margin-bottom: 6px; color: #c8a870; }
.sb-entry { display: flex; align-items: center; gap: 8px; margin: 3px 0; }
.sb-dot { width: 10px; height: 10px; border-radius: 50%; }
#marbleIntro { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(30,15,5,0.92); z-index: 20; display: flex; flex-direction: column; align-items: center; justify-content: center; }
#marbleIntro h2 { font-size: 2em; margin-bottom: 20px; color: #c8a870; text-shadow: 0 0 20px rgba(200,168,112,0.5); }
#marbleAssignments { margin-bottom: 20px; }
.marble-assign { display: flex; align-items: center; gap: 10px; margin: 8px 0; font-size: 1.1em; }
.marble-preview { width: 20px; height: 20px; border-radius: 50%; }

/* Balloons */
#balloonScreen { flex-direction: column; align-items: center; background: #87CEEB; position: relative; overflow: hidden; }
#balloonStatus { font-size: 1.8em; margin-top: 20px; z-index: 2; text-align: center; text-shadow: 0 2px 4px rgba(0,0,0,0.3); color: #333; }
#balloonArea { position: relative; flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; z-index: 2; width: 100%; padding-bottom: 0; overflow: hidden; }
#balloonSvg { width: 100%; flex: 1; min-height: 0; }
.balloon-back { position: absolute; top: 15px; left: 15px; z-index: 10; }
#burstCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 3; pointer-events: none; }
.balloon-label { fill: #fff; font-weight: bold; text-anchor: middle; stroke: #000; stroke-width: 0.5px; paint-order: stroke fill; font-family: Arial, sans-serif; }

/* Golf - Green Course theme */
#golfScreen { flex-direction: column; align-items: center; background: #388E3C; position: relative; overflow: hidden; }
#golfCanvas { display: block; position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
.golf-back { position: absolute; top: 15px; left: 15px; z-index: 10; }
#golfStatus { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 10; font-size: 1.5em; text-shadow: 0 2px 4px rgba(0,0,0,0.5); background: rgba(0,0,0,0.5); padding: 8px 20px; border-radius: 10px; }

<script>
// ============ GLOBALS ============
let players = [];
let playersPicked = 1;
const COLORS = ['#e94560','#f5a623','#3498db','#2ecc71','#9b59b6','#1abc9c','#e67e22','#e74c3c','#00bcd4','#ff5722','#8bc34a','#ffc107','#673ab7','#03a9f4','#ff4081','#cddc39','#ff6b6b','#48dbfb','#feca57','#1dd1a1','#ee5a24','#0abde3','#c44569','#574b90','#f78fb3','#3dc1d3','#e77f67','#786fa6','#63cdda','#cf6a87','#596275','#f19066'];
const BALLOON_COLORS = ['#e94560','#f5a623','#3498db','#2ecc71','#9b59b6','#ff69b4','#ff6347','#40e0d0','#00bcd4','#ff5722','#8bc34a','#ffc107','#673ab7','#03a9f4','#ff4081','#cddc39'];
let currentGameCleanup = null;
let lastWinningMoment = null; // data URL of the winning moment screenshot
const SINGLE_PICK_ONLY = ['wheel', 'namepicker'];
const LARGE_GROUP_GAMES = ['golf', 'wheel']; // Only these available for 17+ players
let playerRangeHigh = false; // false = 1-16, true = 17-32

// Mobile touch helpers
function addTapHandler(el, handler) {
  // Adds both click and touchstart so it works on all devices
  el.onclick = handler;
  el._touchHandler = (e) => { e.preventDefault(); handler(e.touches[0] || e); };
  el.addEventListener('touchstart', el._touchHandler, { passive: false });
}
function removeTapHandler(el) {
  el.onclick = null;
  if (el._touchHandler) { el.removeEventListener('touchstart', el._touchHandler); el._touchHandler = null; }
}
// Prevent default touch on game canvases to avoid scroll/zoom
document.querySelectorAll('canvas').forEach(c => {
  c.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
});

// ============ MUSIC ENGINE ============
let audioCtx = null;
let musicGain = null;
let musicPlaying = null;
let musicMuted = false;
let musicVolume = 0.35;
let musicNodes = [];

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  musicGain = audioCtx.createGain();
  musicGain.gain.value = musicVolume;
  musicGain.connect(audioCtx.destination);
}

function stopMusic() {
  musicNodes.forEach(n => { try { n.stop(); } catch(e) {} try { n.disconnect(); } catch(e) {} });
  musicNodes = [];
  musicPlaying = null;
}

function setMusicVolume(v) {
  musicVolume = v;
  if (musicGain) musicGain.gain.setTargetAtTime(musicMuted ? 0 : v, audioCtx.currentTime, 0.1);
}

function toggleMute() {
  musicMuted = !musicMuted;
  if (musicGain) musicGain.gain.setTargetAtTime(musicMuted ? 0 : musicVolume, audioCtx.currentTime, 0.1);
  const btn = document.getElementById('muteBtn');
  if (btn) btn.textContent = musicMuted ? '🔇' : '🔊';
}

// Note frequency helper
function noteFreq(note, octave) {
  const notes = { C:0, 'C#':1, D:2, 'D#':3, E:4, F:5, 'F#':6, G:7, 'G#':8, A:9, 'A#':10, B:11 };
  return 440 * Math.pow(2, (notes[note] + (octave - 4) * 12 - 9) / 12);
}

// Play a single note with envelope
function playNote(freq, start, dur, type, vol, dest) {
  const osc = audioCtx.createOscillator();
  const env = audioCtx.createGain();
  osc.type = type || 'sine';
  osc.frequency.value = freq;
  env.gain.setValueAtTime(0, start);
  env.gain.linearRampToValueAtTime(vol || 0.15, start + 0.02);
  env.gain.linearRampToValueAtTime(vol * 0.6 || 0.09, start + dur * 0.5);
  env.gain.linearRampToValueAtTime(0, start + dur);
  osc.connect(env);
  env.connect(dest || musicGain);
  osc.start(start);
  osc.stop(start + dur + 0.05);
  musicNodes.push(osc);
  return osc;
}

// Drum hit (noise burst)
function playDrum(start, dur, vol, dest) {
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * dur, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1);
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  const env = audioCtx.createGain();
  const filt = audioCtx.createBiquadFilter();
  filt.type = 'lowpass';
  filt.frequency.value = 400;
  env.gain.setValueAtTime(vol || 0.1, start);
  env.gain.exponentialRampToValueAtTime(0.001, start + dur);
  src.connect(filt);
  filt.connect(env);
  env.connect(dest || musicGain);
  src.start(start);
  src.stop(start + dur + 0.05);
  musicNodes.push(src);
}

// ---- THEME: Setup (mysterious arena) ----
function playSetupMusic() {
  initAudio();
  if (musicPlaying === 'setup') return;
  stopMusic();
  musicPlaying = 'setup';
  const t = audioCtx.currentTime;
  const bpm = 128; const beat = 60 / bpm;
  // Energetic, exciting progression in C major — feels like a game show
  const chords = [
    [noteFreq('C', 3), noteFreq('E', 3), noteFreq('G', 3)],
    [noteFreq('F', 3), noteFreq('A', 3), noteFreq('C', 4)],
    [noteFreq('G', 3), noteFreq('B', 3), noteFreq('D', 4)],
    [noteFreq('A', 2), noteFreq('C', 3), noteFreq('E', 3)]
  ];
  const melody = ['C','E','G','C','B','G','A','F','E','G','C','E','D','B','C','G'];
  function scheduleLoop(startT) {
    if (musicPlaying !== 'setup') return;
    chords.forEach((chord, ci) => {
      const ct = startT + ci * beat * 4;
      // Pumping bass
      playNote(chord[0] * 0.5, ct, beat * 0.8, 'triangle', 0.09);
      playNote(chord[0] * 0.5, ct + beat * 2, beat * 0.8, 'triangle', 0.09);
      // Chord stabs
      chord.forEach(f => {
        playNote(f, ct, beat * 0.3, 'square', 0.03);
        playNote(f, ct + beat * 2, beat * 0.3, 'square', 0.03);
      });
      // Melodic arpeggios running up
      for (let i = 0; i < 4; i++) {
        const mIdx = ci * 4 + i;
        playNote(noteFreq(melody[mIdx % melody.length], 5), ct + i * beat, beat * 0.6, 'sine', 0.05);
      }
      // Drums — kick and hi-hat pattern
      for (let i = 0; i < 4; i++) {
        playDrum(ct + i * beat, 0.08, i % 2 === 0 ? 0.1 : 0.05);
      }
    });
    const loopDur = chords.length * beat * 4;
    const tid = setTimeout(() => scheduleLoop(startT + loopDur), (loopDur - 1) * 1000);
    musicNodes.push({ stop: () => clearTimeout(tid), disconnect: () => {} });
  }
  scheduleLoop(t + 0.1);
}

// ---- THEME: Marble Race (breakneck speed) ----
function playMarbleMusic() {
  initAudio();
  if (musicPlaying === 'marble') return;
  stopMusic();
  musicPlaying = 'marble';
  const t = audioCtx.currentTime;
  const bpm = 240; const beat = 60 / bpm;
  // Frantic 32-note pattern for relentless energy
  const melody = ['E','G','B','E','D','G','A','B','C','E','G','C','B','A','G','E',
                   'G','B','D','G','E','C','A','E','B','G','E','B','D','A','G','E'];
  const bass = ['E','E','A','A','C','C','B','B','E','E','G','G','A','A','B','B'];
  function scheduleLoop(startT) {
    if (musicPlaying !== 'marble') return;
    // Blazing fast melody — 16th note feel
    melody.forEach((n, i) => {
      playNote(noteFreq(n, 5), startT + i * beat, beat * 0.4, 'square', 0.05);
      // Constant harmony — every note gets a lower octave shadow
      playNote(noteFreq(n, 4), startT + i * beat, beat * 0.25, 'sawtooth', 0.025);
    });
    // Driving bass — hits on every beat pair
    bass.forEach((n, i) => {
      const bt = startT + i * beat * 2;
      playNote(noteFreq(n, 2), bt, beat * 1.2, 'triangle', 0.09);
      playNote(noteFreq(n, 2), bt + beat, beat * 0.6, 'triangle', 0.06);
    });
    // Relentless drums — kick every beat, hi-hat EVERY note
    for (let i = 0; i < melody.length; i++) {
      // Kick on every 2nd note, snare accent every 4th
      if (i % 2 === 0) playDrum(startT + i * beat, i % 4 === 0 ? 0.13 : 0.07, i % 4 === 0 ? 0.11 : 0.05);
      // Hi-hat on EVERY single note for machine-gun effect
      const hh = audioCtx.createOscillator();
      const hhg = audioCtx.createGain();
      hh.type = 'square'; hh.frequency.value = 9000 + Math.random() * 3000;
      hhg.gain.setValueAtTime(0.025, startT + i * beat);
      hhg.gain.exponentialRampToValueAtTime(0.001, startT + i * beat + 0.03);
      hh.connect(hhg); hhg.connect(musicGain || audioCtx.destination);
      hh.start(startT + i * beat); hh.stop(startT + i * beat + 0.04);
      musicNodes.push(hh, hhg);
    }
    const dur = melody.length * beat;
    const tid = setTimeout(() => scheduleLoop(startT + dur), (dur - 1) * 1000);
    musicNodes.push({ stop: () => clearTimeout(tid), disconnect: () => {} });
  }
  scheduleLoop(t + 0.1);
}

// ============ SOUND EFFECTS ============
function sfx(type) {
  if (!audioCtx || musicMuted) return;
  const t = audioCtx.currentTime;
  const sfxGain = audioCtx.createGain();
  sfxGain.connect(audioCtx.destination);

  if (type === 'swipe') {
    // Sword swipe — descending noise sweep
    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.2, audioCtx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1);
    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    const filt = audioCtx.createBiquadFilter();
    filt.type = 'bandpass';
    filt.frequency.setValueAtTime(4000, t);
    filt.frequency.exponentialRampToValueAtTime(800, t + 0.15);
    filt.Q.value = 2;
    sfxGain.gain.setValueAtTime(0.2, t);
    sfxGain.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
    src.connect(filt); filt.connect(sfxGain);
    src.start(t); src.stop(t + 0.25);
  }
  else if (type === 'cheer') {
    // Crowd cheer — layered noise bursts with resonance
    for (let k = 0; k < 5; k++) {
      const delay = k * 0.08;
      const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.6, audioCtx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1);
      const src = audioCtx.createBufferSource();
      src.buffer = buf;
      const filt = audioCtx.createBiquadFilter();
      filt.type = 'bandpass';
      filt.frequency.value = 600 + k * 300;
      filt.Q.value = 1.5;
      const env = audioCtx.createGain();
      env.gain.setValueAtTime(0, t + delay);
      env.gain.linearRampToValueAtTime(0.06, t + delay + 0.1);
      env.gain.linearRampToValueAtTime(0.04, t + delay + 0.4);
      env.gain.linearRampToValueAtTime(0, t + delay + 0.7);
      src.connect(filt); filt.connect(env); env.connect(sfxGain);
      src.start(t + delay); src.stop(t + delay + 0.8);
    }
    // Triumphant sting on top
    [noteFreq('C',5), noteFreq('E',5), noteFreq('G',5)].forEach((f, i) => {
      const o = audioCtx.createOscillator();
      const e = audioCtx.createGain();
      o.type = 'triangle'; o.frequency.value = f;
      e.gain.setValueAtTime(0, t + i * 0.05);
      e.gain.linearRampToValueAtTime(0.08, t + i * 0.05 + 0.05);
      e.gain.linearRampToValueAtTime(0, t + 0.8);
      o.connect(e); e.connect(sfxGain);
      o.start(t + i * 0.05); o.stop(t + 0.9);
    });
  }
  else if (type === 'pop') {
    // Balloon pop
    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.15, audioCtx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1);
    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    sfxGain.gain.setValueAtTime(0.25, t);
    sfxGain.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
    src.connect(sfxGain);
    src.start(t); src.stop(t + 0.15);
  }
  else if (type === 'hit') {
    // Impact/explosion
    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.3, audioCtx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1);
    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    const filt = audioCtx.createBiquadFilter();
    filt.type = 'lowpass'; filt.frequency.value = 600;
    sfxGain.gain.setValueAtTime(0.3, t);
    sfxGain.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
    src.connect(filt); filt.connect(sfxGain);
    src.start(t); src.stop(t + 0.3);
  }
  else if (type === 'consume') {
    // Engulf consume — rising gulp
    const o = audioCtx.createOscillator();
    o.type = 'sine';
    o.frequency.setValueAtTime(150, t);
    o.frequency.exponentialRampToValueAtTime(600, t + 0.15);
    sfxGain.gain.setValueAtTime(0.15, t);
    sfxGain.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
    o.connect(sfxGain);
    o.start(t); o.stop(t + 0.25);
  }
  else if (type === 'splash') {
    // Ship hit water splash
    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.4, audioCtx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length);
    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    const filt = audioCtx.createBiquadFilter();
    filt.type = 'bandpass'; filt.frequency.value = 1200; filt.Q.value = 0.8;
    sfxGain.gain.setValueAtTime(0.12, t);
    sfxGain.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
    src.connect(filt); filt.connect(sfxGain);
    src.start(t); src.stop(t + 0.4);
  }
  else if (type === 'tick') {
    // Clock tick
    const o = audioCtx.createOscillator();
    o.type = 'sine'; o.frequency.value = 1200;
    sfxGain.gain.setValueAtTime(0.1, t);
    sfxGain.gain.exponentialRampToValueAtTime(0.001, t + 0.03);
    o.connect(sfxGain);
    o.start(t); o.stop(t + 0.05);
  }
  else if (type === 'putt') {
    // Golf putt
    const o = audioCtx.createOscillator();
    o.type = 'sine';
    o.frequency.setValueAtTime(800, t);
    o.frequency.exponentialRampToValueAtTime(200, t + 0.1);
    sfxGain.gain.setValueAtTime(0.15, t);
    sfxGain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
    o.connect(sfxGain);
    o.start(t); o.stop(t + 0.2);
  }
  else if (type === 'spin') {
    // Wheel tick
    const o = audioCtx.createOscillator();
    o.type = 'triangle'; o.frequency.value = 2000;
    sfxGain.gain.setValueAtTime(0.06, t);
    sfxGain.gain.exponentialRampToValueAtTime(0.001, t + 0.02);
    o.connect(sfxGain);
    o.start(t); o.stop(t + 0.04);
  }
  else if (type === 'finish') {
    // Race finish / marble crosses line
    [noteFreq('G',5), noteFreq('C',6)].forEach((f, i) => {
      const o = audioCtx.createOscillator();
      o.type = 'square'; o.frequency.value = f;
      const e = audioCtx.createGain();
      e.gain.setValueAtTime(0.08, t + i * 0.1);
      e.gain.exponentialRampToValueAtTime(0.001, t + i * 0.1 + 0.3);
      o.connect(e); e.connect(sfxGain);
      o.start(t + i * 0.1); o.stop(t + i * 0.1 + 0.35);
    });
  }
  else if (type === 'eliminate') {
    // Player eliminated — descending sad tone
    const o = audioCtx.createOscillator();
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(400, t);
    o.frequency.exponentialRampToValueAtTime(100, t + 0.3);
    sfxGain.gain.setValueAtTime(0.08, t);
    sfxGain.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
    o.connect(sfxGain);
    o.start(t); o.stop(t + 0.4);
  }
  else if (type === 'countdown') {
    // Countdown beep
    const o = audioCtx.createOscillator();
    o.type = 'sine'; o.frequency.value = 880;
    sfxGain.gain.setValueAtTime(0.12, t);
    sfxGain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
    o.connect(sfxGain);
    o.start(t); o.stop(t + 0.2);
  }
  else if (type === 'go') {
    // GO! high beep
    const o = audioCtx.createOscillator();
    o.type = 'sine'; o.frequency.value = 1320;
    sfxGain.gain.setValueAtTime(0.15, t);
    sfxGain.gain.linearRampToValueAtTime(0.001, t + 0.4);
    o.connect(sfxGain);
    o.start(t); o.stop(t + 0.45);
  }
  else if (type === 'pain') {
    // Pain cry — descending tone with wobble
    const o = audioCtx.createOscillator();
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(800, t);
    o.frequency.linearRampToValueAtTime(300, t + 0.35);
    // Wobble for yelp effect
    const lfo = audioCtx.createOscillator();
    const lfoGain = audioCtx.createGain();
    lfo.frequency.value = 30;
    lfoGain.gain.value = 80;
    lfo.connect(lfoGain);
    lfoGain.connect(o.frequency);
    lfo.start(t); lfo.stop(t + 0.4);
    sfxGain.gain.setValueAtTime(0.12, t);
    sfxGain.gain.linearRampToValueAtTime(0.001, t + 0.35);
    o.connect(sfxGain);
    o.start(t); o.stop(t + 0.4);
  }
  else if (type === 'slot-stop') {
    // Mechanical clunk — low thud + metallic click
    const o = audioCtx.createOscillator();
    o.type = 'sine';
    o.frequency.setValueAtTime(200, t);
    o.frequency.exponentialRampToValueAtTime(60, t + 0.08);
    sfxGain.gain.setValueAtTime(0.2, t);
    sfxGain.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
    o.connect(sfxGain);
    o.start(t); o.stop(t + 0.15);
    // Metallic click on top
    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.05, audioCtx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1);
    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    const filt = audioCtx.createBiquadFilter();
    filt.type = 'highpass'; filt.frequency.value = 3000;
    const clickGain = audioCtx.createGain();
    clickGain.gain.setValueAtTime(0.15, t);
    clickGain.gain.exponentialRampToValueAtTime(0.001, t + 0.04);
    src.connect(filt); filt.connect(clickGain); clickGain.connect(sfxGain);
    src.start(t); src.stop(t + 0.06);
  }
  else if (type === 'slot-win') {
    // Triumphant ascending jingle — C5 E5 G5 C6
    [noteFreq('C',5), noteFreq('E',5), noteFreq('G',5), noteFreq('C',6)].forEach((f, i) => {
      const o = audioCtx.createOscillator();
      const e = audioCtx.createGain();
      o.type = 'triangle'; o.frequency.value = f;
      e.gain.setValueAtTime(0, t + i * 0.08);
      e.gain.linearRampToValueAtTime(0.1, t + i * 0.08 + 0.03);
      e.gain.linearRampToValueAtTime(0.06, t + i * 0.08 + 0.15);
      e.gain.linearRampToValueAtTime(0, t + 0.5);
      o.connect(e); e.connect(sfxGain);
      o.start(t + i * 0.08); o.stop(t + 0.55);
    });
  }
  else if (type === 'click') {
    // Simple UI click
    const o = audioCtx.createOscillator();
    o.type = 'sine'; o.frequency.value = 1000;
    sfxGain.gain.setValueAtTime(0.08, t);
    sfxGain.gain.exponentialRampToValueAtTime(0.001, t + 0.04);
    o.connect(sfxGain);
    o.start(t); o.stop(t + 0.06);
  }
}

// ============ 3x3 SLOT MACHINE ============
let slotSpinning = false;
let slotDebounce = null;
let currentSlotResults = [];
let slotRowClickCleanup = [];
const SLOT_REPS = 8; // repetitions of game list in each strip

function getRecommendedGames(n) {
  const primary = getRecommendedGame(n);
  const picks = parseInt(pickedCountInput.value) || 1;
  const validGames = GAMES.filter(g => {
    if (n > 16 && !LARGE_GROUP_GAMES.includes(g.id)) return false;
    if (n <= 16 && LARGE_GROUP_GAMES.includes(g.id) && g.id !== 'wheel') return false;
    if (picks > 1 && SINGLE_PICK_ONLY.includes(g.id)) return false;
    return true;
  });
  if (validGames.length <= 3) return validGames.map(g => g.id);
  const weights = validGames.map(g => {
    if (g.id === primary) return 6;
    if (['marble','battle','engulf','balloon'].includes(g.id) && n <= 16) return 3;
    if (LARGE_GROUP_GAMES.includes(g.id) && n > 12) return 3;
    return 1;
  });
  const result = [];
  const avail = [...validGames];
  const avW = [...weights];
  for (let i = 0; i < 3 && avail.length > 0; i++) {
    const total = avW.reduce((a,b) => a + b, 0);
    let r = Math.random() * total;
    let idx = 0;
    for (idx = 0; idx < avW.length; idx++) { r -= avW[idx]; if (r <= 0) break; }
    idx = Math.min(idx, avail.length - 1);
    result.push(avail[idx].id);
    avail.splice(idx, 1);
    avW.splice(idx, 1);
  }
  return result;
}

function initSlotMachine() {
  // All 3 columns get IDENTICAL game order so rows always match
  for (let c = 0; c < 3; c++) {
    const strip = document.getElementById('slotColStrip' + c);
    if (!strip) continue;
    strip.innerHTML = '';
    for (let r = 0; r < SLOT_REPS; r++) {
      GAMES.forEach(g => {
        const entry = document.createElement('div');
        entry.className = 'slot-game-entry';
        entry.dataset.gameId = g.id;
        entry.innerHTML = `<span class="sge-icon">${g.icon}</span><span class="sge-name">${g.name}</span>`;
        strip.appendChild(entry);
      });
    }
  }
}

function resetSlotCols() {
  for (let c = 0; c < 3; c++) {
    const strip = document.getElementById('slotColStrip' + c);
    if (!strip) continue;
    strip.style.transition = 'none';
    strip.style.transform = 'translateY(0)';
    strip.classList.remove('spinning');
    const col = document.getElementById('slotCol' + c);
    if (col) col.classList.remove('stopped');
  }
  // Clear row hover/selected classes
  document.querySelectorAll('.slot-game-entry.row-hover, .slot-game-entry.row-selected').forEach(el => {
    el.classList.remove('row-hover', 'row-selected');
  });
  // Update hints
  const hints = document.getElementById('slotHints');
  if (hints) { hints.textContent = 'spinning...'; hints.classList.remove('ready'); }
}

function cleanupRowClicks() {
  slotRowClickCleanup.forEach(fn => fn());
  slotRowClickCleanup = [];
}

function spinSlotMachine() {
  if (slotSpinning) return;
  slotSpinning = true;
  cleanupRowClicks();
  const n = Math.max(2, parseInt(playerCountInput.value) || 2);
  const targets = getRecommendedGames(n);
  currentSlotResults = targets;
  const totalGames = GAMES.length;

  // Reset columns instantly
  resetSlotCols();
  document.getElementById('slotColStrip0').offsetHeight; // force reflow

  // We need the 3 targets to be consecutive in the strip.
  // Rearrange: find an offset in repetition 5 (middle-ish) and place targets at positions 0,1,2 from that offset.
  // Since all columns are identical and we scroll to the same Y, rows will match.
  // Strategy: scroll to land at rep 4's start + custom offset
  // We'll build a custom arrangement at rep 4: targets[0], targets[1], targets[2] then rest of games
  for (let c = 0; c < 3; c++) {
    const strip = document.getElementById('slotColStrip' + c);
    if (!strip) continue;
    // Replace entries in rep 4 (index range: 4*totalGames to 5*totalGames-1)
    const entries = strip.querySelectorAll('.slot-game-entry');
    const repStart = 4 * totalGames;
    // Build desired order: targets first, then remaining games
    const targetGames = targets.map(id => GAMES.find(g => g.id === id));
    const restGames = GAMES.filter(g => !targets.includes(g.id));
    const ordered = [...targetGames, ...restGames];
    for (let j = 0; j < totalGames && (repStart + j) < entries.length; j++) {
      entries[repStart + j].dataset.gameId = ordered[j].id;
      entries[repStart + j].querySelector('.sge-icon').textContent = ordered[j].icon;
      entries[repStart + j].querySelector('.sge-name').textContent = ordered[j].name;
    }
  }

  // Calculate target scroll position: land so targets[0] is at row 0 of viewport
  const firstEntry = document.querySelector('#slotColStrip0 .slot-game-entry');
  const entryH = firstEntry ? firstEntry.offsetHeight : 70;
  const targetPos = 4 * totalGames * entryH; // scroll to rep 4 start

  // Start spin tick sound
  let tickInterval = null;
  let tickCount = 0;
  tickInterval = setInterval(() => {
    sfx('spin');
    tickCount++;
    if (tickCount > 40) { clearInterval(tickInterval); tickInterval = null; }
  }, 80);

  for (let c = 0; c < 3; c++) {
    const strip = document.getElementById('slotColStrip' + c);
    const col = document.getElementById('slotCol' + c);
    if (!strip || !col) continue;
    const delay = c * 400;
    const spinDuration = 1500 + c * 500;

    setTimeout(() => {
      strip.classList.add('spinning');
      strip.style.transition = `transform ${spinDuration}ms cubic-bezier(0.12, 0.8, 0.22, 1)`;
      strip.style.transform = `translateY(-${targetPos}px)`;

      setTimeout(() => {
        strip.classList.remove('spinning');
        col.classList.add('stopped');
        sfx('slot-stop');
        if (c === 2) {
          // All columns stopped
          if (tickInterval) { clearInterval(tickInterval); tickInterval = null; }
          slotSpinning = false;
          sfx('slot-win');
          enableSlotRowClicks(targets, targetPos, entryH);
        }
      }, spinDuration);
    }, delay);
  }
}

function enableSlotRowClicks(targets, scrollPos, entryH) {
  const hints = document.getElementById('slotHints');
  if (hints) { hints.textContent = '\u2190 click a row to play!'; hints.classList.add('ready'); }

  // For each of the 3 visible rows, set up hover and click
  for (let row = 0; row < 3; row++) {
    const gameId = targets[row];
    const gameName = GAMES.find(g => g.id === gameId)?.name || gameId;

    // Get the entry elements in each column for this row
    const rowEntries = [];
    for (let c = 0; c < 3; c++) {
      const strip = document.getElementById('slotColStrip' + c);
      if (!strip) continue;
      const entries = strip.querySelectorAll('.slot-game-entry');
      const totalGames = GAMES.length;
      const idx = 4 * totalGames + row;
      if (entries[idx]) rowEntries.push(entries[idx]);
    }

    // Hover handlers
    const onEnter = () => rowEntries.forEach(e => e.classList.add('row-hover'));
    const onLeave = () => rowEntries.forEach(e => e.classList.remove('row-hover'));

    rowEntries.forEach(entry => {
      entry.addEventListener('mouseenter', onEnter);
      entry.addEventListener('mouseleave', onLeave);
    });

    // Click handler
    const onClick = () => {
      if (slotSpinning) return;
      rowEntries.forEach(e => { e.classList.remove('row-hover'); e.classList.add('row-selected'); });
      sfx('click');
      setTimeout(() => submitPlayersWithGame(gameId), 400);
    };

    rowEntries.forEach(entry => {
      addTapHandler(entry, onClick);
    });

    // Store cleanup
    slotRowClickCleanup.push(() => {
      rowEntries.forEach(entry => {
        entry.removeEventListener('mouseenter', onEnter);
        entry.removeEventListener('mouseleave', onLeave);
        removeTapHandler(entry);
        entry.classList.remove('row-hover', 'row-selected');
      });
    });
  }
}

function captureCanvasMoment(canvasId, winnerName) {
  try {
    const c = document.getElementById(canvasId);
    if (!c || c.tagName !== 'CANVAS') return;
    // Create a copy with winner overlay
    const tc = document.createElement('canvas');
    tc.width = c.width; tc.height = c.height;
    const ctx = tc.getContext('2d');
    ctx.drawImage(c, 0, 0);
    // Add winner name banner if provided (sized large enough for mobile polaroid)
    if (winnerName) {
      const bannerH = Math.max(48, tc.height * 0.12);
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      ctx.fillRect(0, 0, tc.width, bannerH);
      ctx.shadowColor = 'rgba(0,0,0,0.9)';
      ctx.shadowBlur = 6;
      ctx.fillStyle = '#fff';
      ctx.font = `bold ${Math.floor(bannerH * 0.55)}px monospace`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('\u{1F3C6} ' + winnerName + ' wins!', tc.width / 2, bannerH / 2);
      ctx.shadowBlur = 0;
    }
    lastWinningMoment = tc.toDataURL('image/png');
  } catch(e) { lastWinningMoment = null; }
}

function captureShipsMoment(winnerNames) {
  try {
    const s = shipsState;
    if (!s) return;
    const tc = document.createElement('canvas');
    const size = 400, pad = 20, cellSize = (size - pad * 2) / 4, gap = 4;
    tc.width = size; tc.height = size + 40;
    const ctx = tc.getContext('2d');
    // Ocean background
    ctx.fillStyle = '#1a3a5c';
    ctx.fillRect(0, 0, tc.width, tc.height);
    // Winner banner
    const label = Array.isArray(winnerNames) ? winnerNames.join(', ') : winnerNames;
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, size, 32);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 14px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('🏆 ' + label + ' survives!', size / 2, 16);
    // Grid
    const aliveSet = s.alive;
    for (let r = 0; r < 4; r++) {
      for (let c = 0; c < 4; c++) {
        const cx = pad + c * cellSize + gap / 2;
        const cy = 36 + r * cellSize + gap / 2;
        const cw = cellSize - gap;
        const key = `${r},${c}`;
        const ship = s.ships[key];
        if (ship && !ship.destroyed && aliveSet.has(ship.player)) {
          // Winning ship — golden glow highlight
          ctx.shadowColor = '#ffd700';
          ctx.shadowBlur = 12;
          ctx.fillStyle = '#2a5a3a';
          ctx.fillRect(cx, cy, cw, cw);
          ctx.shadowBlur = 0;
          // Ship icon
          const color = COLORS[ship.player];
          const mx = cx + cw / 2, my = cy + cw / 2;
          // Hull
          ctx.fillStyle = '#5c3a1e';
          ctx.beginPath();
          ctx.moveTo(mx - cw * 0.35, my + cw * 0.15);
          ctx.lineTo(mx - cw * 0.25, my + cw * 0.35);
          ctx.lineTo(mx + cw * 0.25, my + cw * 0.35);
          ctx.lineTo(mx + cw * 0.35, my + cw * 0.15);
          ctx.fill();
          // Mast
          ctx.fillStyle = '#5c3a1e';
          ctx.fillRect(mx - 1.5, my - cw * 0.35, 3, cw * 0.5);
          // Sail
          ctx.fillStyle = color;
          ctx.globalAlpha = 0.9;
          ctx.beginPath();
          ctx.moveTo(mx, my - cw * 0.35);
          ctx.lineTo(mx, my + cw * 0.1);
          ctx.lineTo(mx - cw * 0.28, my + cw * 0.1);
          ctx.fill();
          ctx.globalAlpha = 0.7;
          ctx.beginPath();
          ctx.moveTo(mx + 1, my - cw * 0.25);
          ctx.lineTo(mx + 1, my + cw * 0.1);
          ctx.lineTo(mx + cw * 0.22, my + cw * 0.1);
          ctx.fill();
          ctx.globalAlpha = 1;
          // Player name
          ctx.fillStyle = '#fff';
          ctx.font = `bold ${Math.max(8, Math.floor(cw * 0.14))}px monospace`;
          ctx.textAlign = 'center';
          ctx.fillText(players[ship.player].substring(0, 7), mx, cy + cw - 4);
          // Gold border
          ctx.strokeStyle = '#ffd700';
          ctx.lineWidth = 2;
          ctx.strokeRect(cx, cy, cw, cw);
        } else if (ship && ship.destroyed) {
          // Destroyed ship — dark red, fire emoji
          ctx.fillStyle = '#3a1a1a';
          ctx.fillRect(cx, cy, cw, cw);
          ctx.fillStyle = '#ff4444';
          ctx.font = `${Math.floor(cw * 0.4)}px serif`;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText('\uD83D\uDD25', cx + cw / 2, cy + cw / 2);
          ctx.fillStyle = '#888';
          ctx.font = `${Math.max(7, Math.floor(cw * 0.12))}px monospace`;
          ctx.fillText(players[ship.player].substring(0, 7), cx + cw / 2, cy + cw - 4);
          ctx.strokeStyle = '#555';
          ctx.lineWidth = 1;
          ctx.strokeRect(cx, cy, cw, cw);
        } else if (s.hitCells.has(key)) {
          // Empty miss
          ctx.fillStyle = '#1a2a3a';
          ctx.fillRect(cx, cy, cw, cw);
          ctx.fillStyle = '#334';
          ctx.font = `${Math.floor(cw * 0.3)}px serif`;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText('✕', cx + cw / 2, cy + cw / 2);
          ctx.strokeStyle = '#334';
          ctx.lineWidth = 1;
          ctx.strokeRect(cx, cy, cw, cw);
        } else {
          // Unrevealed
          ctx.fillStyle = '#2a4a6a';
          ctx.fillRect(cx, cy, cw, cw);
          ctx.fillStyle = 'rgba(100,160,220,0.3)';
          ctx.fillRect(cx + 2, cy + 2, cw - 4, cw - 4);
          ctx.strokeStyle = '#3a5a7a';
          ctx.lineWidth = 1;
          ctx.strokeRect(cx, cy, cw, cw);
        }
      }
    }
    lastWinningMoment = tc.toDataURL('image/png');
  } catch(e) { lastWinningMoment = null; }
}
function captureSvgMoment(svgId) {
  try {
    const svg = document.getElementById(svgId);
    const svgRect = svg.getBoundingClientRect();
    const w = svgRect.width || 600, h = svgRect.height || 420;
    const clone = svg.cloneNode(true);
    clone.setAttribute('width', w);
    clone.setAttribute('height', h);
    const data = new XMLSerializer().serializeToString(clone);
    const blob = new Blob([data], {type: 'image/svg+xml;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const img = new Image();
    img.onload = () => {
      const tc = document.createElement('canvas');
      tc.width = w; tc.height = h;
      const tctx = tc.getContext('2d');
      tctx.drawImage(img, 0, 0, w, h);
      lastWinningMoment = tc.toDataURL('image/png');
      URL.revokeObjectURL(url);
      // Update the winner screen image if already showing
      const mi = document.getElementById('winnerMomentImg');
      if (mi && lastWinningMoment) { mi.src = lastWinningMoment; mi.parentElement.style.display = ''; }
    };
    img.src = url;
  } catch(e) { lastWinningMoment = null; }
}
function captureWheelMoment(winnerName) {
  try {
    const src = document.getElementById('wheelCanvas');
    if (!src) return;
    const tc = document.createElement('canvas');
    const w = 400, h = 300;
    tc.width = w; tc.height = h;
    const ctx = tc.getContext('2d');
    // Zoom into the right side where the pointer points
    ctx.drawImage(src, 100, 50, 300, 300, 0, 0, w, h);
    // Draw pointer triangle on right edge
    ctx.fillStyle = '#d4af37';
    ctx.beginPath();
    ctx.moveTo(w, h / 2 - 22);
    ctx.lineTo(w, h / 2 + 22);
    ctx.lineTo(w - 38, h / 2);
    ctx.closePath();
    ctx.shadowColor = 'rgba(0,0,0,0.5)';
    ctx.shadowBlur = 6;
    ctx.shadowOffsetX = -2;
    ctx.fill();
    ctx.shadowBlur = 0; ctx.shadowOffsetX = 0;
    ctx.strokeStyle = '#b8860b';
    ctx.lineWidth = 2;
    ctx.stroke();
    // Winner banner
    ctx.fillStyle = 'rgba(0,0,0,0.65)';
    ctx.fillRect(0, 0, w, 30);
    ctx.fillStyle = '#ffd700';
    ctx.font = 'bold 16px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('\u{1F3C6} ' + winnerName + ' wins!', w / 2, 15);
    lastWinningMoment = tc.toDataURL('image/png');
  } catch(e) { lastWinningMoment = null; }
}
async function copyWinningMoment() {
  if (!lastWinningMoment) return;
  try {
    const resp = await fetch(lastWinningMoment);
    const blob = await resp.blob();
    await navigator.clipboard.write([new ClipboardItem({'image/png': blob})]);
    const btn = document.getElementById('copyMomentBtn');
    if (btn) { const orig = btn.textContent; btn.textContent = '✓ Copied!'; setTimeout(() => btn.textContent = orig, 1500); }
  } catch(e) {
    // Fallback: open in new tab
    const btn = document.getElementById('copyMomentBtn');
    if (btn) btn.textContent = 'Copy failed';
  }
}

let fireworksRAF = null;
function showWinner(name) {
  // name can be a string or an array of strings

    document.getElementById('winnerSub').textContent = name.length > 1 ? 'have been picked!' : 'has been picked!';
  } else {

    document.getElementById('winnerSub').textContent = 'has been picked!';
  }
  // Show winning moment polaroid if captured
  const momentWrap = document.getElementById('winnerMomentWrap');
  const momentImg = document.getElementById('winnerMomentImg');
  const caption = document.getElementById('polaroidCaption');
  if (lastWinningMoment && momentWrap && momentImg) {
    momentImg.src = lastWinningMoment;
    momentWrap.style.display = '';
    if (caption) caption.textContent = Array.isArray(name) ? name.join(', ') + ' 🏆' : name + ' 🏆';
  } else if (momentWrap) {
    momentWrap.style.display = 'none';
  }
  showScreen('winnerScreen');
  playWinnerMusic();
  sfx('cheer');
  startFireworks();
}

function startFireworks() {
  const canvas = document.getElementById('winnerCanvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  const particles = [];
  const rockets = [];

  function spawnRocket() {
    rockets.push({
      x: Math.random() * canvas.width,
      y: canvas.height,
      targetY: canvas.height * (0.15 + Math.random() * 0.35),
      speed: 4 + Math.random() * 3,
      color: COLORS[Math.floor(Math.random() * COLORS.length)]
    });
  }

  function explode(x, y, color) {
    const count = 40 + Math.floor(Math.random() * 30);
    for (let i = 0; i < count; i++) {
      const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.3;
      const speed = 1 + Math.random() * 4;
      particles.push({ x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, life: 1, color, decay: 0.008 + Math.random() * 0.012 });
    }
  }

  let lastSpawn = 0;
  function frame(t) {
    ctx.fillStyle = 'rgba(26,26,46,0.2)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    if (t - lastSpawn > 400) { spawnRocket(); lastSpawn = t; }
    for (let i = rockets.length - 1; i >= 0; i--) {
      const r = rockets[i];
      r.y -= r.speed;
      ctx.beginPath(); ctx.arc(r.x, r.y, 3, 0, Math.PI * 2); ctx.fillStyle = r.color; ctx.fill();
      if (r.y <= r.targetY) { explode(r.x, r.y, r.color); rockets.splice(i, 1); }
    }
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.vy += 0.03; p.life -= p.decay;
      if (p.life <= 0) { particles.splice(i, 1); continue; }
      ctx.globalAlpha = p.life;
      ctx.beginPath(); ctx.arc(p.x, p.y, 2.5, 0, Math.PI * 2); ctx.fillStyle = p.color; ctx.fill();
    }
    ctx.globalAlpha = 1;
    fireworksRAF = requestAnimationFrame(frame);
  }
  fireworksRAF = requestAnimationFrame(frame);
}

function stopFireworks() { if (fireworksRAF) { cancelAnimationFrame(fireworksRAF); fireworksRAF = null; } }

// ============ GAME 1: SPINNING WHEEL (Casino) ============
let wheelAngle = 0, wheelSpinning = false;

function initWheel() {
  showScreen('wheelScreen');
  wheelAngle = 0; wheelSpinning = false;
  document.getElementById('spinBtn').disabled = false;
  drawWheel();
}

function drawWheel() {
  const canvas = document.getElementById('wheelCanvas');
  const ctx = canvas.getContext('2d');
  const cx = 200, cy = 200, r = 180;
  ctx.clearRect(0, 0, 400, 400);

  // Outer gold ring
  ctx.beginPath(); ctx.arc(cx, cy, r + 8, 0, Math.PI * 2);
  ctx.strokeStyle = '#d4af37'; ctx.lineWidth = 6; ctx.stroke();
  ctx.beginPath(); ctx.arc(cx, cy, r + 12, 0, Math.PI * 2);
  ctx.strokeStyle = '#b8860b'; ctx.lineWidth = 2; ctx.stroke();

  // Gold dots around the rim
  const dotCount = 24;
  for (let i = 0; i < dotCount; i++) {
    const a = (Math.PI * 2 * i) / dotCount;
    const dx = cx + Math.cos(a) * (r + 8);
    const dy = cy + Math.sin(a) * (r + 8);
    ctx.beginPath(); ctx.arc(dx, dy, 3, 0, Math.PI * 2);
    ctx.fillStyle = '#ffd700'; ctx.fill();
  }

  const n = players.length;
  const arc = (Math.PI * 2) / n;
  // Casino-style alternating red/black with gold accents
  const casinoColors = ['#c0392b','#2c3e50','#e74c3c','#34495e','#c0392b','#2c3e50','#e74c3c','#34495e'];
  for (let i = 0; i < n; i++) {
    const startAngle = wheelAngle + i * arc;
    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.arc(cx, cy, r, startAngle, startAngle + arc); ctx.closePath();
    ctx.fillStyle = casinoColors[i % casinoColors.length]; ctx.fill();
    ctx.strokeStyle = '#d4af37'; ctx.lineWidth = 2; ctx.stroke();
    // Text
    const midAngle = startAngle + arc / 2;
    const normMid = ((midAngle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
    ctx.save(); ctx.translate(cx, cy); ctx.rotate(midAngle);
    ctx.fillStyle = '#ffd700'; ctx.font = 'bold 15px Georgia'; ctx.textBaseline = 'middle';
    if (normMid > Math.PI / 2 && normMid < Math.PI * 3 / 2) {
      ctx.rotate(Math.PI); ctx.textAlign = 'center';
      ctx.fillText(players[i], -r * 0.6, 0);
    } else {
      ctx.textAlign = 'center';
      ctx.fillText(players[i], r * 0.6, 0);
    }
    ctx.restore();
  }
  // Center hub - gold
  ctx.beginPath(); ctx.arc(cx, cy, 35, 0, Math.PI * 2);
  const hubGrad = ctx.createRadialGradient(cx - 5, cy - 5, 5, cx, cy, 35);
  hubGrad.addColorStop(0, '#ffd700'); hubGrad.addColorStop(1, '#b8860b');
  ctx.fillStyle = hubGrad; ctx.fill();
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
}

function spinWheel() {
  if (wheelSpinning) return;
  wheelSpinning = true;
  document.getElementById('spinBtn').disabled = true;
  const duration = 12000;
  const startVelocity = 30 + Math.random() * 10; // Much faster initial spin
  const spinStart = performance.now();

  function animate(now) {
    const elapsed = now - spinStart;
    const t = Math.min(elapsed / duration, 1);
    // Cubic ease-out for faster start, gradual slow
    const progress = 1 - Math.pow(1 - t, 3);
    wheelAngle = startVelocity * progress;
    drawWheel();
    if (t >= 1) {
      wheelSpinning = false;
      const n = players.length;
      const arc = (Math.PI * 2) / n;
      let normAngle = (-wheelAngle % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2);
      const idx = Math.floor(normAngle / arc);
      captureWheelMoment(players[idx % n]);
      setTimeout(() => showWinner(players[idx % n]), 500);
      return;
    }
    requestAnimationFrame(animate);
  }
  requestAnimationFrame(animate);
}

// ============ GAME 2: SHIPS (Medieval Cannon) ============
let shipsState = null;

function initShips() {
  showScreen('shipsScreen');
  const grid = document.getElementById('shipsGrid');
  grid.innerHTML = '';
  shipsState = {
    placingPlayer: 0,
    ships: {},
    hitCells: new Set(),
    alive: new Set(players.map((_, i) => i)),
    phase: 'placing',
    intervals: [],
    timeouts: [],
    rafs: [],
    explosionParticles: []
  };
  for (let r = 0; r < 4; r++) {
    for (let c = 0; c < 4; c++) {
      const cell = document.createElement('div');
      cell.className = 'grid-cell';
      cell.dataset.r = r; cell.dataset.c = c;
      cell.addEventListener('click', () => placeShip(r, c, cell));
      grid.appendChild(cell);
    }
  }
  document.getElementById('shipsStatus').textContent = `${players[0]} - place your ship!`;
  cannonCooldown = false;
  document.getElementById('cannonWholeGroup').classList.remove('cooldown');
  currentGameCleanup = cleanupShips;
}

function cleanupShips() {
  if (!shipsState) return;
  shipsState.intervals.forEach(clearInterval);
  shipsState.timeouts.forEach(clearTimeout);
  shipsState.rafs.forEach(cancelAnimationFrame);
  shipsState = null;
}

function placeShip(r, c, cell) {
  if (!shipsState || shipsState.phase !== 'placing') return;
  const key = `${r},${c}`;
  if (shipsState.ships[key]) return;
  const playerIdx = shipsState.placingPlayer;
  shipsState.ships[key] = { player: playerIdx, destroyed: false };
  const sailColor = COLORS[playerIdx];
  cell.innerHTML = `<svg viewBox="0 0 40 40" width="100%" height="100%"><!-- Hull --><path d="M6,28 L10,36 L30,36 L34,28 Z" fill="#5c3a1e" stroke="#3d2510" stroke-width="0.8"/><line x1="6" y1="28" x2="34" y2="28" stroke="#3d2510" stroke-width="1"/><rect x="18" y="8" width="2.5" height="20" fill="#5c3a1e"/><!-- Sail --><polygon points="20,9 20,25 9,25" fill="${sailColor}" opacity="0.9" stroke="${sailColor}" stroke-width="0.5"/><polygon points="21,12 21,25 30,25" fill="${sailColor}" opacity="0.7" stroke="${sailColor}" stroke-width="0.5"/></svg>`;
  cell.style.cursor = 'default';
  shipsState.placingPlayer++;
  if (shipsState.placingPlayer >= players.length) {
    shipsState.phase = 'firing';
    document.getElementById('shipsStatus').textContent = 'Fire!';
    startCannonFiring();
  } else {
    document.getElementById('shipsStatus').textContent = `${players[shipsState.placingPlayer]} - place your ship!`;
  }
}

function startCannonFiring() {
  const s = shipsState;

  // Explosion animation loop
  const expCanvas = document.getElementById('explosionCanvas');
  const expCtx = expCanvas.getContext('2d');
  function animateExplosions() {
    expCtx.clearRect(0, 0, 300, 150);
    for (let i = s.explosionParticles.length - 1; i >= 0; i--) {
      const p = s.explosionParticles[i];
      p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life -= 0.025;
      if (p.life <= 0) { s.explosionParticles.splice(i, 1); continue; }
      expCtx.globalAlpha = p.life;
      expCtx.beginPath(); expCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      expCtx.fillStyle = p.color; expCtx.fill();
    }
    expCtx.globalAlpha = 1;
    if (shipsState) {
      const raf = requestAnimationFrame(animateExplosions);
      s.rafs.push(raf);
    }
  }
  animateExplosions();

  // Auto-fire on a timer (same cooldown as manual)
  function autoFireLoop() {
    if (!shipsState || shipsState.phase !== 'firing') return;
    manualFire();
    const tid = setTimeout(autoFireLoop, 1200);
    if (shipsState) shipsState.timeouts.push(tid);
  }
  const tid = setTimeout(autoFireLoop, 800);
  s.timeouts.push(tid);
}

let cannonCooldown = false;
function manualFire() {
  if (!shipsState || shipsState.phase !== 'firing' || cannonCooldown) return;
  cannonCooldown = true;
  const cannonGroup = document.getElementById('cannonWholeGroup');
  cannonGroup.classList.add('cooldown');

  // Cannon recoil animation
  cannonGroup.style.transition = 'transform 0.1s';
  cannonGroup.style.transform = 'translate(0px, 5px)';
  setTimeout(() => {
    cannonGroup.style.transform = 'translate(0px, 0px)';
    cannonGroup.style.transition = '';
  }, 100);

  // Fire immediately
  fireShot();

  // Cooldown
  setTimeout(() => {
    cannonCooldown = false;
    if (shipsState && shipsState.phase === 'firing') {
      cannonGroup.classList.remove('cooldown');
    }
  }, 1000);
}

function createCannonExplosion() {
  if (!shipsState) return;
  const colors = ['#ff6600','#ff3300','#ff9900','#ffcc00','#ff0000','#333'];
  for (let i = 0; i < 30; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 5;
    shipsState.explosionParticles.push({
      x: 160, y: 60,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 2,
      life: 0.5 + Math.random() * 0.5,
      size: 2 + Math.random() * 5,
      color: colors[Math.floor(Math.random() * colors.length)]
    });
  }
}

function fireShot() {
  const s = shipsState;
  const unhit = [];
  for (let r = 0; r < 4; r++) {
    for (let c = 0; c < 4; c++) {
      if (!s.hitCells.has(`${r},${c}`)) unhit.push([r, c]);
    }
  }
  if (unhit.length === 0) return;
  const [r, c] = unhit[Math.floor(Math.random() * unhit.length)];
  s.hitCells.add(`${r},${c}`);

  // Cannon explosion effect
  createCannonExplosion();

  const cells = document.querySelectorAll('.grid-cell');
  const cell = cells[r * 4 + c];
  cell.classList.add('hit');
  cell.style.cursor = 'default';

  const key = `${r},${c}`;
  if (s.ships[key] && !s.ships[key].destroyed) {
    // Hit a ship
    sfx('hit');
    setTimeout(() => cell.classList.remove('hit'), 500);
    s.ships[key].destroyed = true;
    cell.innerHTML = '\uD83D\uDD25';
    cell.classList.add('destroyed');
    for (let i = 0; i < 2; i++) {
      const smoke = document.createElement('div');
      smoke.className = 'smoke';
      smoke.style.left = (2 + Math.random() * 15) + 'px';
      smoke.style.top = (2 + Math.random() * 10) + 'px';
      smoke.style.animationDelay = (Math.random() * 1.5) + 's';
      cell.appendChild(smoke);
    }
    s.alive.delete(s.ships[key].player);
    if (s.alive.size <= playersPicked) {
      const picked = [...s.alive].map(i => players[i]);
      s.phase = 'done';
      captureShipsMoment(picked);
      setTimeout(() => { resetGame(); showWinner(picked.length === 1 ? picked[0] : picked); }, 1500);
    }
  } else {
    // Miss - show dark with cross after flash
    sfx('splash');
    setTimeout(() => {
      cell.classList.remove('hit');
      cell.classList.add('hit-empty');
    }, 500);
  }
}

  const canvas = document.getElementById('marbleCanvas');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');

  const n = players.length;
  const trackWidth = canvas.width < 500 ? canvas.width * 0.55 : canvas.width * 0.7;
  const laneWidth = trackWidth / n;
  const trackLeft = (canvas.width - trackWidth) / 2;
  const marbleR = Math.min(laneWidth * 0.35, 18);
  const baseSpeed = 8.5;
  const trackLength = baseSpeed * 60 * 20;

  // Static circle obstacles
  const obstacles = [];
  const obsCount = 20 + n * 4;
  for (let i = 0; i < obsCount; i++) {
    obstacles.push({
      type: 'circle',
      x: trackLeft + Math.random() * trackWidth,
      y: -(200 + Math.random() * (trackLength - 400)),
      r: 12 + Math.random() * 20
    });
  }

  // Moving triangle obstacles
  const triangles = [];
  const triCount = 15 + n * 3;
  for (let i = 0; i < triCount; i++) {
    const triY = -(300 + Math.random() * (trackLength - 600));
    const triSize = 15 + Math.random() * 15;
    const triSpeed = (0.5 + Math.random() * 1.5) * (Math.random() < 0.5 ? 1 : -1);
    const triColor = ['#4a6a5a','#6a4a5a','#4a5a6a','#6a6a4a','#6a4a4a'][Math.floor(Math.random() * 5)];
    triangles.push({
      baseX: trackLeft + trackWidth / 2,
      x: trackLeft + Math.random() * trackWidth,
      y: triY,
      size: triSize,
      speed: triSpeed,
      color: triColor
    });
  }

  const marbles = players.map((p, i) => {
    const mat = MARBLE_MATERIALS[i % MARBLE_MATERIALS.length];
    return {
      x: trackLeft + laneWidth * (i + 0.5),
      y: -30,
      vx: (Math.random() - 0.5) * 0.5,
      vy: -baseSpeed,
      baseVy: -baseSpeed,
      hitTime: null,
      boostTime: null,
      name: p,
      color: mat.color,
      innerColor: mat.innerColor,
      pattern: mat.pattern,
      matName: mat.name,
      finished: false,
      finishTime: null
    };
  });

  // Boost pads — spawn dynamically for losing marbles
  const boostPads = [];
  let lastBoostSpawn = 0;
  const boostPadH = marbleR * 4; // height = 2 marble diameters

  function spawnBoostPads(t) {
    if (t - lastBoostSpawn < 3000) return; // spawn check every 3s
    if (marbles.filter(m => !m.finished).length < 2) return;
    lastBoostSpawn = t;
    // Rank marbles by position (higher y = further behind)
    const active = marbles.filter(m => !m.finished);
    const sorted = [...active].sort((a, b) => b.y - a.y); // worst first
    // Spawn pads for the bottom half (losers)
    const losers = sorted.slice(0, Math.max(1, Math.floor(sorted.length / 2)));
    losers.forEach(m => {
      // Don't spawn if marble already boosted recently
      if (m.boostTime && t - m.boostTime < 4000) return;
      // Random chance to spawn (not every cycle)
      if (Math.random() > 0.6) return;
      const widthMultiplier = 1 + Math.floor(Math.random() * 3); // 1-3 marbles wide
      const padW = marbleR * 2 * widthMultiplier;
      // Place pad ahead of the losing marble (in their path)
      const padX = m.x - padW / 2 + (Math.random() - 0.5) * marbleR;
      const padY = m.y - canvas.height * 0.4 - Math.random() * canvas.height * 0.3;
      // Clamp to track bounds
      const clampedX = Math.max(trackLeft, Math.min(trackLeft + trackWidth - padW, padX));
      boostPads.push({
        x: clampedX,
        y: padY,
        w: padW,
        h: boostPadH,
        used: false,
        spawnTime: t
      });
    });
    // Spawn decoy pads in random positions (not targeting any marble) so spawning looks random
    const decoyCount = 1 + Math.floor(Math.random() * 2); // 1-2 decoys per cycle
    for (let d = 0; d < decoyCount; d++) {
      if (Math.random() > 0.5) continue; // 50% chance each
      const widthMultiplier = 1 + Math.floor(Math.random() * 3);
      const padW = marbleR * 2 * widthMultiplier;
      const padX = trackLeft + Math.random() * (trackWidth - padW);
      const padY = getLeadY() - canvas.height * 0.3 - Math.random() * canvas.height * 0.6;
      boostPads.push({
        x: padX,
        y: padY,
        w: padW,
        h: boostPadH,
        used: false,
        spawnTime: t
      });
    }
    // Remove old pads that are way behind the camera
    for (let i = boostPads.length - 1; i >= 0; i--) {
      if (boostPads[i].y - cameraY > canvas.height + 200) boostPads.splice(i, 1);
    }
  }

  const startTime = performance.now();
  let finishLineY = null;
  let finishSpawnTime = null; // when finish line appeared (for smooth map transition)
  let halfwayLineY = null;
  let halfwayShown = false;
  let winners = null;
  let mapMinY = 0; // tracks the furthest point any marble has reached (for stable map)
  let smoothRaceEnd = null; // smoothly interpolated race end for track map
  let cameraY = 0;
  let lastTime = performance.now();
  let glowPhase = 0;

  marbleState = { raf: null };

  function getLeadY() {
    let minY = 0;
    marbles.forEach(m => { if (m.y < minY) minY = m.y; });
    return minY;
  }

  function updateScoreboard() {
    const sb = document.getElementById('marbleScoreboard');
    const sorted = [...marbles].sort((a, b) => a.y - b.y);
    sb.innerHTML = '<h4 style="color:#c8a870">Positions</h4>' + sorted.map((m, i) =>
      `<div class="sb-entry"><span style="color:#c8a870;width:18px;">${i+1}.</span><div class="sb-dot" style="background:${m.color}"></div>${m.name}</div>`
    ).join('');
  }

  function drawMarble(m, sy) {
    const mat = m;
    // Outer glow
    ctx.beginPath(); ctx.arc(m.x, sy, marbleR + 3, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${parseInt(m.color.slice(1,3),16)},${parseInt(m.color.slice(3,5),16)},${parseInt(m.color.slice(5,7),16)},0.3)`;
    ctx.fill();
    // Main sphere with gradient
    const grad = ctx.createRadialGradient(m.x - marbleR * 0.3, sy - marbleR * 0.3, marbleR * 0.1, m.x, sy, marbleR);
    grad.addColorStop(0, m.innerColor);
    grad.addColorStop(0.7, m.color);
    grad.addColorStop(1, m.pattern === 'dark' ? '#111' : m.color);
    ctx.beginPath(); ctx.arc(m.x, sy, marbleR, 0, Math.PI * 2);
    ctx.fillStyle = grad; ctx.fill();
    // Metallic streak
    if (m.pattern === 'metallic') {
      ctx.beginPath(); ctx.arc(m.x + marbleR * 0.15, sy, marbleR * 0.8, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.15)'; ctx.fill();
    }
    // Gem sparkle
    ctx.beginPath(); ctx.arc(m.x - marbleR * 0.3, sy - marbleR * 0.3, marbleR * 0.25, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.6)'; ctx.fill();
    // Border
    ctx.beginPath(); ctx.arc(m.x, sy, marbleR, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 1.5; ctx.stroke();
  }

  function frame(t) {
    const elapsed = (t - startTime) / 1000;
    const dt = Math.min((t - lastTime) / 16.667, 3);
    lastTime = t;
    glowPhase += 0.02 * dt;
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const leadY = getLeadY();
    const targetCamY = leadY - canvas.height * 0.4;
    cameraY += (targetCamY - cameraY) * (1 - Math.pow(0.95, dt));

    // Wooden track background
    ctx.fillStyle = '#8B6F47';
    ctx.fillRect(trackLeft - 10, 0, trackWidth + 20, canvas.height);

    // Scrolling plank lines (horizontal wood planks)
    const plankH = 40;
    const plankOffset = ((cameraY % plankH) + plankH) % plankH;
    ctx.strokeStyle = '#7A5E3A';
    ctx.lineWidth = 1;
    for (let py = -plankOffset; py < canvas.height + plankH; py += plankH) {
      ctx.beginPath(); ctx.moveTo(trackLeft - 10, py); ctx.lineTo(trackLeft + trackWidth + 10, py); ctx.stroke();
    }

    // Wood grain lines (vertical, subtle)
    ctx.strokeStyle = 'rgba(90,60,30,0.15)';
    ctx.lineWidth = 1;
    for (let gx = trackLeft; gx < trackLeft + trackWidth; gx += 12) {
      ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, canvas.height); ctx.stroke();
    }

    // Lane groove lines
    ctx.strokeStyle = 'rgba(0,0,0,0.25)';
    ctx.setLineDash([20, 10]);
    ctx.lineWidth = 2;
    for (let i = 1; i < n; i++) {
      const lx = trackLeft + i * laneWidth;
      ctx.beginPath(); ctx.moveTo(lx, 0); ctx.lineTo(lx, canvas.height); ctx.stroke();
    }
    ctx.setLineDash([]);

    // Wooden rail borders — retro pixel style
    const railPx = 3;
    const railColors = ['#5C3A1E','#4A2E16','#6B4527','#3D2510'];
    for (let ry = 0; ry < canvas.height; ry += railPx) {
      const ci = (Math.floor(ry / railPx)) % railColors.length;
      ctx.fillStyle = railColors[ci];
      ctx.fillRect(trackLeft - 14, ry, 6, railPx);
      ctx.fillRect(trackLeft + trackWidth + 8, ry, 6, railPx);
    }
    // Retro scanlines over the track (subtle)
    ctx.fillStyle = 'rgba(0,0,0,0.06)';
    for (let sy2 = 0; sy2 < canvas.height; sy2 += 4) {
      ctx.fillRect(trackLeft - 10, sy2, trackWidth + 20, 2);
    }

    // Halfway line at 10s
    if (elapsed >= 10 && !halfwayShown) {
      halfwayLineY = leadY - canvas.height * 0.3;
      halfwayShown = true;
    }
    if (halfwayLineY !== null) {
      const hy = halfwayLineY - cameraY;
      if (hy > -30 && hy < canvas.height + 30) {
        ctx.strokeStyle = '#ffff00'; ctx.lineWidth = 3;
        ctx.setLineDash([8, 8]);
        ctx.beginPath(); ctx.moveTo(trackLeft - 10, hy); ctx.lineTo(trackLeft + trackWidth + 10, hy); ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle = '#ffff00'; ctx.font = 'bold 14px monospace'; ctx.textAlign = 'center';
        ctx.fillText('HALFWAY', canvas.width / 2, hy - 8);
      }
    }

    // Finish line after 20s
    if (elapsed >= 20 && finishLineY === null) {
      finishLineY = leadY - canvas.height * 0.5;
      finishSpawnTime = performance.now();
    }
    if (finishLineY !== null) {
      const fy = finishLineY - cameraY;
      const sqSize = 15;
      const numSq = Math.ceil(trackWidth / sqSize) + 2;
      for (let i = 0; i < numSq; i++) {
        for (let j = 0; j < 2; j++) {
          ctx.fillStyle = (i + j) % 2 === 0 ? '#fff' : '#111';
          ctx.fillRect(trackLeft - 10 + i * sqSize, fy + j * sqSize, sqSize, sqSize);
        }
      }
    }

    // Update triangle positions
    triangles.forEach(tri => {
      tri.x += tri.speed * dt;
      if (tri.x < trackLeft + tri.size) { tri.x = trackLeft + tri.size; tri.speed = Math.abs(tri.speed); }
      if (tri.x > trackLeft + trackWidth - tri.size) { tri.x = trackLeft + trackWidth - tri.size; tri.speed = -Math.abs(tri.speed); }
    });

    // Find leader (lowest y = furthest ahead)
    let leaderIdx = 0;
    marbles.forEach((m, i) => { if (!m.finished && m.y < marbles[leaderIdx].y) leaderIdx = i; });

    // Update marbles
    marbles.forEach((m, mi) => {
      if (m.finished) return;
      if (m.hitTime !== null && (t - m.hitTime) > 5000) { m.hitTime = null; }
