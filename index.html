    // Draw all names
    s.placedNames.forEach((pn, i) => {
      const isActive = i === s.flashIdx;
      if (isActive) {
        // Active: bright, glowing, scaled up
        const pulse = 1 + Math.sin(t * 0.008) * 0.05;
        ctx.save();
        ctx.translate(pn.x, pn.y);
        ctx.scale(pulse, pulse);
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 32px Georgia';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.shadowColor = pn.color;
        ctx.shadowBlur = 25;
        ctx.fillText(pn.name, 0, 0);
        ctx.shadowBlur = 0;
        ctx.restore();
        // Glow ring
        ctx.beginPath();
        ctx.arc(pn.x, pn.y, 50, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(255,255,255,${0.15 + Math.sin(t * 0.006) * 0.1})`;
        ctx.lineWidth = 2;
        ctx.stroke();
      } else {
        // Dim
        ctx.globalAlpha = 0.25;
        ctx.fillStyle = pn.color;
        ctx.font = '22px Georgia';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(pn.name, pn.x, pn.y);
        ctx.globalAlpha = 1;
      }
    });

    // Check if done
    if (progress >= 1 && s.phase !== 'done') {
      s.phase = 'done';
      const winner = s.placedNames[s.winnerIdx];
      document.getElementById('namePickerStatus').innerHTML =
        `<span style="color:${winner.color}">${winner.name}</span> picked!`;
      captureCanvasMoment('namePickerCanvas', winner.name);
      setTimeout(() => { resetGame(); showWinner(winner.name); }, 3000);
    }
  }

  if (s.phase === 'done') {
    // Keep drawing with winner highlighted
    s.placedNames.forEach((pn, i) => {
      const isWinner = i === s.winnerIdx;
      if (isWinner) {
        const pulse = 1 + Math.sin(t * 0.006) * 0.08;
        ctx.save();
        ctx.translate(pn.x, pn.y);
        ctx.scale(pulse, pulse);
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 36px Georgia';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.shadowColor = pn.color;
        ctx.shadowBlur = 30;
        ctx.fillText(pn.name, 0, 0);
        ctx.shadowBlur = 0;
        ctx.restore();
      } else {
        ctx.globalAlpha = 0.15;
        ctx.fillStyle = '#888';
        ctx.font = '20px Georgia';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(pn.name, pn.x, pn.y);
        ctx.globalAlpha = 1;
      }
    });
  }

  s.raf = requestAnimationFrame(namePickerLoop);
}

// ============ GAME 9: ENGULF ============
let engulfState = null;

function drawPolygon(ctx, cx, cy, radius, sides, fillColor, strokeColor, rotation) {
  rotation = rotation || -Math.PI / 2;
  ctx.beginPath();
  for (let i = 0; i <= sides; i++) {
    const angle = rotation + (Math.PI * 2 * i) / sides;
    const x = cx + radius * Math.cos(angle);
    const y = cy + radius * Math.sin(angle);
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.fillStyle = fillColor;
  ctx.fill();
  if (strokeColor) {
    ctx.strokeStyle = strokeColor;
    ctx.lineWidth = 2;
    ctx.stroke();
  }
}

function initEngulf() {
  showScreen('engulfScreen');
  const canvas = document.getElementById('engulfCanvas');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const margin = 80;

  // Spawn player octagons at spread-out positions
  const octagons = players.map((name, i) => {
    const cols = Math.ceil(Math.sqrt(players.length));
    const row = Math.floor(i / cols);
    const col = i % cols;
    const cellW = (W - 2 * margin) / cols;
    const cellH = (H - 2 * margin) / Math.ceil(players.length / cols);
    return {
      name, color: COLORS[i],
      x: margin + cellW * (col + 0.5) + (Math.random() - 0.5) * cellW * 0.4,
      y: margin + cellH * (row + 0.5) + (Math.random() - 0.5) * cellH * 0.4,
      volume: 800, alive: true, pulseTime: 0
    };
  });

  // Spawn heptagon food with tiers
  const foodCount = 20 + players.length * 3;
  const FOOD_TIERS = [
    { color: '#66ff66', minVol: 80, maxVol: 120, weight: 50, tier: 'common', glow: 0 },
    { color: '#ffdd44', minVol: 150, maxVol: 250, weight: 25, tier: 'uncommon', glow: 4 },
    { color: '#ff7744', minVol: 300, maxVol: 450, weight: 15, tier: 'rare', glow: 8 },
    { color: '#ff44ff', minVol: 500, maxVol: 700, weight: 10, tier: 'legendary', glow: 15 }
  ];
  const totalWeight = FOOD_TIERS.reduce((s, t) => s + t.weight, 0);
  function pickFoodTier() {
    let r = Math.random() * totalWeight;
    for (const t of FOOD_TIERS) { r -= t.weight; if (r <= 0) return t; }
    return FOOD_TIERS[0];
  }
  const heptagons = [];
  for (let i = 0; i < foodCount; i++) {
    const tier = pickFoodTier();
    heptagons.push({
      x: margin + Math.random() * (W - 2 * margin),
      y: margin + Math.random() * (H - 2 * margin),
      volume: tier.minVol + Math.random() * (tier.maxVol - tier.minVol),
      alive: true,
      color: tier.color,
      tier: tier.tier,
      glow: tier.glow,
      wobble: Math.random() * Math.PI * 2,
      spawnDelay: i * 40 + Math.random() * 30,
      spawned: false
    });
  }

  // Background particles
  const bgParticles = [];
  for (let i = 0; i < 50; i++) {
    bgParticles.push({
      x: Math.random() * W, y: Math.random() * H,
      size: 0.5 + Math.random() * 1.5,
      speed: 0.1 + Math.random() * 0.3,
      alpha: 0.2 + Math.random() * 0.4
    });
  }

  engulfState = {
    phase: 'intro', introStart: 0, introIdx: 0,
    countdownStart: 0,
    octagons, heptagons, bgParticles,
    raf: null, winner: null, doneTime: 0,
    canvas, ctx, W, H, endgameStart: 0
  };

  // Build info panel
  const info = document.getElementById('engulfInfo');
  info.innerHTML = '<div style="color:#9370db;font-weight:bold;margin-bottom:6px">Players</div>' +
    octagons.map(o => `<div id="ei_${o.name.replace(/\s/g,'_')}" style="display:flex;align-items:center;gap:6px;margin:3px 0"><div style="width:12px;height:12px;background:${o.color};border-radius:2px"></div><span>${o.name}</span> <span class="ev" style="color:#888;font-size:0.8em">(${Math.round(o.volume)})</span></div>`).join('');
  document.getElementById('engulfStatus').textContent = '';

  currentGameCleanup = cleanupEngulf;
  engulfState.raf = requestAnimationFrame(engulfLoop);
}

function cleanupEngulf() {
  if (engulfState && engulfState.raf) cancelAnimationFrame(engulfState.raf);
  engulfState = null;
}

function radiusFromVolume(v) { return Math.sqrt(v / Math.PI); }
function engulfSpeed(v) { return 1.8 + 0.6 * Math.log(v / 800 + 1); }
function engulfDist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }

function updateEngulfScoreboard(o) {
  const el = document.getElementById('ei_' + o.name.replace(/\s/g, '_'));
  if (el) { const ev = el.querySelector('.ev'); if (ev) ev.textContent = '(' + Math.round(o.volume) + ')'; }
}
function eliminateEngulf(o) {
  const el = document.getElementById('ei_' + o.name.replace(/\s/g, '_'));
  if (el) { el.style.textDecoration = 'line-through'; el.style.opacity = '0.4'; }
}

function engulfLoop(t) {
  const s = engulfState;
  if (!s) return;
  const { ctx, W, H } = s;
  ctx.clearRect(0, 0, W, H);

  // Background particles
  s.bgParticles.forEach(p => {
    p.y -= p.speed;
    if (p.y < 0) { p.y = H; p.x = Math.random() * W; }
    ctx.fillStyle = `rgba(147,112,219,${p.alpha})`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  });

  // === INTRO PHASE ===
  if (s.phase === 'intro') {
    if (!s.introStart) s.introStart = t;
    const perPlayer = 1200;
    const elapsed = t - s.introStart;
    const idx = Math.floor(elapsed / perPlayer);

    // Draw revealed octagons
    for (let i = 0; i <= Math.min(idx, s.octagons.length - 1); i++) {
      const o = s.octagons[i];
      const r = radiusFromVolume(o.volume);
      const progress = i < idx ? 1 : Math.min((elapsed - i * perPlayer) / perPlayer, 1);
      const scale = 0.3 + 0.7 * progress;
      ctx.globalAlpha = progress;
      drawPolygon(ctx, o.x, o.y, r * scale, 8, o.color, 'rgba(255,255,255,0.5)');
      ctx.fillStyle = '#fff';
      ctx.font = `bold ${Math.max(12, r * 0.8)}px Arial`;
      ctx.textAlign = 'center';
      ctx.fillText(o.name, o.x, o.y - r * scale - 8);
      ctx.globalAlpha = 1;
    }

    // Show current player name in status
    if (idx < s.octagons.length) {
      document.getElementById('engulfStatus').textContent = s.octagons[idx].name;
    }

    if (elapsed > s.octagons.length * perPlayer + 500) {
      s.phase = 'countdown';
      s.countdownStart = t;
      document.getElementById('engulfStatus').textContent = '';
    }

    s.raf = requestAnimationFrame(engulfLoop);
    return;
  }

  // === COUNTDOWN PHASE ===
  if (s.phase === 'countdown') {
    const elapsed = t - s.countdownStart;
    // Draw all octagons
    s.octagons.forEach(o => {
      const r = radiusFromVolume(o.volume);
      drawPolygon(ctx, o.x, o.y, r, 8, o.color, 'rgba(255,255,255,0.5)');
      ctx.fillStyle = '#fff';
      ctx.font = `bold ${Math.max(12, r * 0.8)}px Arial`;
      ctx.textAlign = 'center';
      ctx.fillText(o.name, o.x, o.y - r - 8);
    });
    // Draw heptagons with spawn animation
    const countdownElapsed = t - s.countdownStart;
    s.heptagons.forEach(h => {
      if (!h.alive) return;
      const spawnProgress = Math.min(1, Math.max(0, (countdownElapsed - h.spawnDelay) / 400));
      if (spawnProgress <= 0) return;
      const scale = 0.3 + 0.7 * spawnProgress;
      const r = radiusFromVolume(h.volume) * scale;
      ctx.globalAlpha = spawnProgress;
      if (h.glow > 0) { ctx.shadowColor = h.color; ctx.shadowBlur = h.glow * spawnProgress; }
      drawPolygon(ctx, h.x, h.y, r, 7, h.color, null, h.wobble + t * 0.001);
      if (h.glow > 0) ctx.shadowBlur = 0;
      ctx.globalAlpha = 1;
    });

    // Countdown text
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const sec = Math.ceil(3 - elapsed / 1000);
    if (sec > 0) {
      ctx.font = 'bold 120px Arial';
      ctx.globalAlpha = 0.8;
      ctx.fillText(sec, W / 2, H / 2);
      ctx.globalAlpha = 1;
    } else if (elapsed < 4500) {
      ctx.font = 'bold 80px Arial';
      ctx.fillStyle = '#9370db';
      ctx.globalAlpha = Math.max(0, 1 - (elapsed - 3000) / 1500);
      ctx.fillText('ENGULF!', W / 2, H / 2);
      ctx.globalAlpha = 1;
    }

    if (elapsed > 4500) {
      s.phase = 'playing';
    }

    s.raf = requestAnimationFrame(engulfLoop);
    return;
  }

  // === PLAYING & ENDGAME PHASES ===
  const aliveOcts = s.octagons.filter(o => o.alive);

  if (s.phase === 'playing' || s.phase === 'endgame') {
    const aliveFood = s.heptagons.filter(h => h.alive);

    // Move octagons
    // When only 2 left, biggest gets 3x speed
    let biggestAlive = null;
    if (aliveOcts.length === 2) {
      biggestAlive = aliveOcts[0].volume >= aliveOcts[1].volume ? aliveOcts[0] : aliveOcts[1];
    }
    aliveOcts.forEach(o => {
      const r = radiusFromVolume(o.volume);
      let speed = engulfSpeed(o.volume);
      if (biggestAlive === o) speed *= 1.8;
      let targetX, targetY, hasTarget = false;

      if (s.phase === 'playing' && aliveFood.length > 0) {
        // Check for huntable prey first (1.5× rule — prioritize over food)
        let prey = null, preyDist = Infinity;
        aliveOcts.forEach(other => {
          if (other === o) return;
          if (o.volume >= 1.5 * other.volume) {
            const d = engulfDist(o, other);
            if (d < W * 0.35 && d < preyDist) { prey = other; preyDist = d; }
          }
        });
        if (prey) {
          targetX = prey.x; targetY = prey.y; hasTarget = true;
        } else {
          // Find nearest food
          let best = null, bestD = Infinity;
          aliveFood.forEach(h => {
            const d = engulfDist(o, h);
            if (d < bestD) { bestD = d; best = h; }
          });
          if (best) { targetX = best.x; targetY = best.y; hasTarget = true; }
        }
      } else {
        // Endgame: chase smaller octagons, flee from all if none smaller
        let prey = null, preyDist = Infinity;
        let hasSmallerTarget = false;
        aliveOcts.forEach(other => {
          if (other === o) return;
          if (o.volume > other.volume) {
            hasSmallerTarget = true;
            const d = engulfDist(o, other);
            if (d < preyDist) { preyDist = d; prey = other; }
          }
        });
        if (prey) {
          targetX = prey.x; targetY = prey.y; hasTarget = true;
        } else {
          // Flee from all — move away from centroid of other octagons
          let cx = 0, cy = 0, count = 0;
          aliveOcts.forEach(other => {
            if (other === o) return;
            cx += other.x; cy += other.y; count++;
          });
          if (count > 0) {
            cx /= count; cy /= count;
            // Move away from centroid
            targetX = o.x - (cx - o.x); targetY = o.y - (cy - o.y);
            hasTarget = true;
          }
        }
      }

      if (hasTarget) {
        const dx = targetX - o.x;
        const dy = targetY - o.y;
        const d = Math.hypot(dx, dy);
        if (d > 1) {
          o.x += (dx / d) * speed;
          o.y += (dy / d) * speed;
        }
      }

      // Clamp to bounds
      o.x = Math.max(r, Math.min(W - r, o.x));
      o.y = Math.max(r + 50, Math.min(H - r, o.y));
    });

    // Check food consumption
    if (s.phase === 'playing') {
      aliveOcts.forEach(o => {
        s.heptagons.forEach(h => {
          if (!h.alive || !o.alive) return;
          const d = engulfDist(o, h);
          if (d < radiusFromVolume(o.volume) + radiusFromVolume(h.volume) * 0.5) {
            o.volume += h.volume;
            h.alive = false;
            o.pulseTime = 1.0;
            sfx('consume');
            updateEngulfScoreboard(o);
          }
        });
      });

      // Transition to endgame if no food left
      if (s.heptagons.filter(h => h.alive).length === 0) {
        s.phase = 'endgame';
        s.endgameStart = t;
      }
    }

    // Octagon vs octagon collisions
    for (let i = 0; i < aliveOcts.length; i++) {
      for (let j = i + 1; j < aliveOcts.length; j++) {
        const a = aliveOcts[i], b = aliveOcts[j];
        if (!a.alive || !b.alive) continue;
        const rA = radiusFromVolume(a.volume);
        const rB = radiusFromVolume(b.volume);
        const d = engulfDist(a, b);
        const touchDist = rA + rB;

        if (d < touchDist) {
          let consumer = null, victim = null;

          // Check cooldown — skip if either octagon recently consumed
          if ((a.consumeCooldown && t - a.consumeCooldown < 1000) ||
              (b.consumeCooldown && t - b.consumeCooldown < 1000)) {
            // Still on cooldown — just repel
            const angle = Math.atan2(b.y - a.y, b.x - a.x);
            const overlap = touchDist - d;
            const push = overlap * 0.35;
            a.x -= Math.cos(angle) * push;
            a.y -= Math.sin(angle) * push;
            b.x += Math.cos(angle) * push;
            b.y += Math.sin(angle) * push;
            continue;
          }

          if (s.phase === 'endgame') {
            // Endgame: larger always wins, equal = random
            if (a.volume > b.volume) { consumer = a; victim = b; }
            else if (b.volume > a.volume) { consumer = b; victim = a; }
            else { consumer = Math.random() < 0.5 ? a : b; victim = consumer === a ? b : a; }
          } else {
            // Playing phase: need 1.5x to consume
            if (a.volume >= 1.5 * b.volume) { consumer = a; victim = b; }
            else if (b.volume >= 1.5 * a.volume) { consumer = b; victim = a; }
          }

          if (consumer && victim) {
            // Set 1 second cooldown on the consumer
            consumer.consumeCooldown = t;
            // Start absorption animation instead of instant transfer
            victim.alive = false;
            victim.deathTime = t;
            victim.lastX = victim.x;
            victim.lastY = victim.y;
            consumer.absorbing = consumer.absorbing || [];
            consumer.absorbing.push({
              x: victim.x, y: victim.y, color: victim.color,
              volume: victim.volume, startTime: t,
              particles: Array.from({length: 8}, () => ({
                offset: Math.random() * 0.3,
                angle: Math.random() * Math.PI * 2,
                spread: 5 + Math.random() * 15
              }))
            });
            consumer.pulseTime = 1.0;
            eliminateEngulf(victim);
            sfx('eliminate');
          } else if (d < touchDist) {
            // Repel — push apart
            const angle = Math.atan2(b.y - a.y, b.x - a.x);
            const overlap = touchDist - d;
            const push = overlap * 0.35;
            a.x -= Math.cos(angle) * push;
            a.y -= Math.sin(angle) * push;
            b.x += Math.cos(angle) * push;
            b.y += Math.sin(angle) * push;
          }
        }
      }
    }

    // Process absorption animations — gradually transfer volume
    aliveOcts.forEach(o => {
      if (!o.absorbing || o.absorbing.length === 0) return;
      o.absorbing = o.absorbing.filter(ab => {
        const progress = Math.min((t - ab.startTime) / 800, 1);
        // Transfer volume progressively
        const transferPerFrame = ab.volume / 48; // ~0.8s at 60fps
        if (progress < 1) {
          o.volume += transferPerFrame;
          ab.volume -= transferPerFrame;
          updateEngulfScoreboard(o);
          return true; // keep
        } else {
          o.volume += ab.volume; // transfer remainder
          updateEngulfScoreboard(o);
          return false; // remove
        }
      });
    });

    // Check for winner
    const remaining = s.octagons.filter(o => o.alive);
    if (remaining.length <= playersPicked && s.phase !== 'done') {
      s.phase = 'done';
      s.winners = remaining;
      s.doneTime = t;
      const winNames = remaining.map(o => `<span style="color:${o.color}">${o.name}</span>`);
      document.getElementById('engulfStatus').innerHTML = winNames.join(', ') + (winNames.length > 1 ? ' win!' : ' wins!');
    }
    // If somehow 0 remain (shouldn't happen)
    if (remaining.length === 0 && s.phase !== 'done') {
      s.phase = 'done';
      s.doneTime = t;
    }
  }

  // === DONE PHASE ===
  if (s.phase === 'done' && s.winners && s.winners.length > 0 && t - s.doneTime > 3000) {
    const picked = s.winners.map(o => o.name);
    captureCanvasMoment('engulfCanvas', picked.join(', '));
    resetGame();
    showWinner(picked.length === 1 ? picked[0] : picked);
    return;
  }

  // === DRAW ALL ===
  // Draw alive heptagons
  s.heptagons.forEach(h => {
    if (!h.alive) return;
    const r = radiusFromVolume(h.volume);
    if (h.glow > 0) { ctx.shadowColor = h.color; ctx.shadowBlur = h.glow; }
    drawPolygon(ctx, h.x, h.y, r, 7, h.color, null, h.wobble + t * 0.001);
    if (h.glow > 0) ctx.shadowBlur = 0;
    if (h.glow > 0) ctx.shadowBlur = 0;
  });

  // Draw octagons (alive ones)
  s.octagons.forEach(o => {
    if (!o.alive) return;
    let r = radiusFromVolume(o.volume);
    // Pulse effect
    if (o.pulseTime > 0) {
      r *= (1 + 0.15 * o.pulseTime);
      o.pulseTime = Math.max(0, o.pulseTime - 0.05);
    }
    // Glow
    ctx.shadowColor = o.color;
    ctx.shadowBlur = 10 + (s.phase === 'endgame' ? 10 : 0);
    drawPolygon(ctx, o.x, o.y, r, 8, o.color, 'rgba(255,255,255,0.4)');
    ctx.shadowBlur = 0;
    // Name label
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${Math.max(11, Math.min(r * 0.55, 20))}px Arial`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(o.name, o.x, o.y);
  });

  // Draw absorption animations
  s.octagons.forEach(o => {
    if (!o.absorbing || o.absorbing.length === 0) return;
    o.absorbing.forEach(ab => {
      const progress = Math.min((t - ab.startTime) / 800, 1);
      ab.particles.forEach(p => {
        const pProgress = Math.min(1, (progress + p.offset) / 1.0);
        // Particle moves from source to consumer
        const px = ab.x + (o.x - ab.x) * pProgress + Math.sin(pProgress * Math.PI * 3 + p.angle) * p.spread * (1 - pProgress);
        const py = ab.y + (o.y - ab.y) * pProgress + Math.cos(pProgress * Math.PI * 3 + p.angle) * p.spread * (1 - pProgress);
        const pr = (1 - pProgress) * 6 + 2;
        ctx.globalAlpha = (1 - pProgress) * 0.8;
        ctx.fillStyle = ab.color;
        ctx.shadowColor = ab.color;
        ctx.shadowBlur = 6;
        ctx.beginPath();
        ctx.arc(px, py, pr, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.shadowBlur = 0;
      ctx.globalAlpha = 1;
    });
  });

  // Dead octagons — fading out
  s.octagons.forEach(o => {
    if (o.alive || !o.deathTime) return;
    const fade = Math.max(0, 1 - (t - o.deathTime) / 1000);
    if (fade <= 0) return;
    const r = radiusFromVolume(200); // small ghost
    ctx.globalAlpha = fade * 0.3;
    drawPolygon(ctx, o.lastX || o.x, o.lastY || o.y, r, 8, o.color, null);
    ctx.globalAlpha = 1;
  });


  s.raf = requestAnimationFrame(engulfLoop);
}
</script>
</body>
